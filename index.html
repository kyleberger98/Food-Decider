<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1410" />
<title>What Should I Eat?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14100d;
    --bg-elev: #1f1813;
    --bg-card: #261d17;
    --bg-card-hover: #322519;
    --border: #3a2a1f;
    --border-strong: #5a4232;
    --text: #f5e9d8;
    --text-dim: #b8a48d;
    --text-muted: #8a7560;
    --terracotta: #d97757;
    --terracotta-deep: #b85a3d;
    --cream: #f5e9d8;
    --forest: #6b8a4a;
    --forest-deep: #4a6b3a;
    --gold: #d4a574;
    --rose: #c97e7e;
    --shadow: 0 12px 40px rgba(0,0,0,0.5);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 15% 8%, rgba(217, 119, 87, 0.08), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(107, 138, 74, 0.07), transparent 45%);
    background-attachment: fixed;
  }
  h1, h2, h3, .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
    position: relative;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 6px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--cream);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--terracotta), var(--gold));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .brand small { color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-left: 6px;}

  .progress {
    margin-top: 10px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: opacity 0.3s ease;
  }
  .progress.hidden { opacity: 0; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--terracotta), var(--gold));
    width: 0%;
    transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }
  .progress-label {
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 0 40px;
    position: relative;
    min-height: 0;
  }

  .screen { animation: screenIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { to { opacity: 0; transform: translateY(-12px); } }
  .screen.leaving { animation: fadeOut 0.25s ease forwards; }

  /* ---------- Welcome ---------- */
  .welcome { text-align: center; padding: 12px 0 0; }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .welcome h1 {
    font-size: clamp(40px, 9vw, 60px);
    margin-bottom: 14px;
    color: var(--cream);
  }
  .welcome h1 em {
    font-style: italic;
    color: var(--terracotta);
    font-weight: 500;
  }
  .lede {
    font-size: 16px;
    color: var(--text-dim);
    max-width: 460px;
    margin: 0 auto 28px;
    line-height: 1.55;
  }
  .hero-art {
    width: 160px;
    height: 160px;
    margin: 0 auto 8px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, var(--gold), transparent 60%),
      radial-gradient(circle at 70% 70%, var(--terracotta), transparent 65%),
      radial-gradient(circle at 50% 50%, var(--forest-deep), var(--bg-elev));
    box-shadow: 0 20px 60px rgba(217,119,87,0.15), inset 0 0 40px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .path-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 420px;
    margin: 0 auto 26px;
  }
  .path-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--cream);
    border-radius: var(--radius);
    padding: 16px 20px;
    font: inherit;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    transition: all 0.18s ease;
  }
  .path-btn.primary {
    background: linear-gradient(135deg, var(--terracotta), var(--terracotta-deep));
    border-color: var(--terracotta);
    color: #1a0e08;
  }
  .path-btn.primary:hover {
    background: linear-gradient(135deg, var(--terracotta-deep), var(--terracotta));
    color: var(--cream);
  }
  .path-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--terracotta);
    transform: translateY(-1px);
  }
  .path-btn .emoji { font-size: 24px; flex-shrink: 0; }
  .path-btn .label { font-weight: 600; line-height: 1.2; }
  .path-btn .desc { font-size: 13px; opacity: 0.8; font-weight: 400; margin-top: 2px; }
  .path-btn.primary .desc { color: rgba(26,14,8,0.7); }
  .path-btn.primary:hover .desc { color: rgba(245,233,216,0.85); }
  .path-btn .arrow { margin-left: auto; opacity: 0.6; font-size: 18px; }

  .shortcut-section {
    max-width: 480px;
    margin: 0 auto;
  }
  .shortcut-section-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 10px;
    text-align: center;
  }
  .shortcut-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .shortcut {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 10px 14px;
    font: inherit;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.18s ease;
  }
  .shortcut:hover {
    background: var(--bg-card-hover);
    border-color: var(--terracotta);
    transform: translateY(-1px);
  }
  .shortcut .emoji { font-size: 18px; }
  .shortcut .label { font-weight: 500; }

  /* ---------- Question screen ---------- */
  .q-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .q-title {
    font-size: clamp(28px, 5.5vw, 40px);
    margin-bottom: 10px;
    color: var(--cream);
  }
  .q-sub {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 28px;
    line-height: 1.55;
  }

  .options { display: grid; gap: 10px; grid-template-columns: 1fr; }
  .options.cols-2 { grid-template-columns: 1fr 1fr; }
  .options.chips { display: flex; flex-wrap: wrap; gap: 8px; }

  .opt {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 16px 18px;
    text-align: left;
    cursor: pointer;
    font: inherit;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.18s ease;
    width: 100%;
    animation: optIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .opt:hover { background: var(--bg-card-hover); border-color: var(--border-strong); transform: translateY(-1px); }
  .opt:active { transform: scale(0.99); }
  .opt.selected {
    background: linear-gradient(135deg, rgba(217,119,87,0.12), rgba(212,165,116,0.08));
    border-color: var(--terracotta);
    box-shadow: 0 0 0 1px var(--terracotta) inset;
  }
  .opt.selected::after { content: '✓'; margin-left: auto; color: var(--terracotta); font-weight: 700; }
  .opt-emoji { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
  .opt-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .opt-label { font-weight: 500; }
  .opt-desc { font-size: 13px; color: var(--text-muted); font-weight: 400; }

  .opt.chip { border-radius: 999px; padding: 9px 16px; width: auto; font-size: 14px; gap: 6px; }
  .opt.chip .opt-emoji { font-size: 16px; width: auto; }

  @keyframes optIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .nav-row {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: space-between;
  }
  .btn {
    background: var(--terracotta);
    color: #1a0e08;
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { background: var(--terracotta-deep); transform: translateY(-1px); color: var(--cream); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-lg { padding: 17px 36px; font-size: 16px; }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 12px 22px;
  }
  .btn-ghost:hover { background: var(--bg-card); color: var(--cream); border-color: var(--border-strong); }

  .btn-link {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 8px;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--border-strong);
  }
  .btn-link:hover { color: var(--terracotta); }

  /* ---------- Targets / fields ---------- */
  .targets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 6px;
  }
  .field {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.15s ease;
  }
  .field:focus-within { border-color: var(--terracotta); }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .field-row { display: flex; align-items: baseline; gap: 6px; }
  .field input {
    background: transparent;
    border: none;
    color: var(--cream);
    font: inherit;
    font-size: 22px;
    font-weight: 600;
    font-family: 'Fraunces', serif;
    width: 100%;
    outline: none;
    padding: 0;
  }
  .field-unit { color: var(--text-muted); font-size: 13px; font-weight: 500; }
  .targets-hint {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--forest);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 14px;
    line-height: 1.5;
  }
  .targets-hint strong { color: var(--cream); }

  .target-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(107, 138, 74, 0.12);
    border: 1px solid rgba(107, 138, 74, 0.3);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-dim);
  }
  .target-banner .label { color: var(--forest); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; }
  .target-banner .num { color: var(--cream); font-weight: 600; }

  /* Custom avoid input */
  .custom-avoid {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
    margin-top: 14px;
  }
  .custom-avoid:focus { border-color: var(--terracotta); }
  .custom-avoid::placeholder { color: var(--text-muted); }
  .custom-avoid-label {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* ---------- Location ---------- */
  .loc-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
  }
  .loc-icon {
    width: 64px; height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--terracotta), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .zip-row {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .zip-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 12px 18px;
    font: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .zip-input:focus { border-color: var(--terracotta); }

  /* ---------- Loading ---------- */
  .loading { text-align: center; padding: 40px 0; }
  .pot {
    width: 110px;
    height: 110px;
    margin: 0 auto 24px;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    animation: stir 2.5s ease-in-out infinite;
  }
  @keyframes stir { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
  .steam {
    position: absolute;
    top: -10px; left: 50%;
    width: 6px; height: 30px;
    background: linear-gradient(to top, var(--text-dim), transparent);
    border-radius: 3px;
    opacity: 0;
    transform: translateX(-50%);
    animation: steam 2.4s ease-in-out infinite;
  }
  .steam.s2 { left: 38%; animation-delay: 0.6s; }
  .steam.s3 { left: 62%; animation-delay: 1.2s; }
  @keyframes steam {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
    40% { opacity: 0.6; }
    100% { opacity: 0; transform: translate(-50%, -30px) scale(1.4); }
  }
  .loading h2 { font-size: 26px; margin-bottom: 8px; }
  .loading-msg { color: var(--text-dim); font-size: 15px; min-height: 22px; transition: opacity 0.4s ease; }

  /* ---------- Hero card (results) ---------- */
  .hero-card {
    background: linear-gradient(135deg, rgba(217,119,87,0.14), rgba(212,165,116,0.08), rgba(107,138,74,0.05));
    border: 1px solid var(--terracotta);
    border-radius: var(--radius);
    padding: 28px 24px 22px;
    margin-bottom: 16px;
    position: relative;
    animation: revealUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes revealUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero-eyebrow .pos { color: var(--text-muted); font-weight: 600; }
  .hero-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 700;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .hero-brief {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 14px;
    line-height: 1.55;
  }
  .hero-reasoning {
    font-style: italic;
    color: var(--gold);
    font-size: 14px;
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 2px solid rgba(212,165,116,0.4);
  }
  .hero-macros {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  .hero-macros .pill {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(217,119,87,0.3);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .hero-macros .pill .v { color: var(--cream); font-weight: 600; }
  .hero-macros .pill.kcal .v { color: var(--gold); }
  .hero-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .hero-actions .btn { padding: 13px 22px; }
  .hero-dislike {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: auto;
  }
  .hero-dislike:hover {
    border-color: var(--rose);
    color: var(--rose);
    background: rgba(201,126,126,0.08);
  }

  /* ---------- Filter badge ---------- */
  .filter-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(107,138,74,0.14);
    border: 1px solid rgba(107,138,74,0.35);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--forest);
    font-weight: 600;
    margin-top: 10px;
  }
  .filter-badge .icon { font-size: 13px; }

  /* ---------- Sections ---------- */
  .section-title {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 28px 0 12px;
    font-weight: 600;
  }
  .section-sub {
    color: var(--text-dim);
    font-size: 13px;
    margin: -4px 0 12px;
  }

  /* ---------- Alt dish list ---------- */
  .alt-list { display: flex; flex-direction: column; gap: 8px; }
  .alt-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    font: inherit;
    color: inherit;
    width: 100%;
  }
  .alt-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .alt-card .alt-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--cream);
    font-size: 15px;
  }
  .alt-card .alt-macros { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .alt-card .alt-macros .kcal { color: var(--gold); font-weight: 600; }
  .alt-card .swap-icon { color: var(--terracotta); font-weight: 700; font-size: 14px; margin-left: 6px; }

  /* ---------- Place / recipe cards ---------- */
  .place-card, .recipe-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    transition: all 0.18s ease;
    text-decoration: none;
    color: inherit;
  }
  .place-card:hover, .recipe-card:hover {
    border-color: var(--border-strong);

/* ============================================================
   STATE + persistence
============================================================ */
const STORAGE_KEY = 'food_decider_v3';

const state = {
  flow: 'welcome',        // welcome | quick | full | shortcut | couple
  shortcut: null,         // current shortcut config if applicable
  step: 0,
  answers: {},
  targets: null,
  coords: null,
  recommendation: null,
  candidates: [],         // ordered list of candidate dishes (or recipes)
  heroIndex: 0,           // current hero in candidates
  places: [],
  couple: null,
};

const persisted = { dislikes: [], recentPicks: [] };

function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (Array.isArray(obj.dislikes)) persisted.dislikes = obj.dislikes.slice(0, 200);
    if (Array.isArray(obj.recentPicks)) persisted.recentPicks = obj.recentPicks.slice(0, 30);
  } catch {}
}
function savePersisted() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(persisted)); } catch {}
}
function addDislike(name) {
  if (!name) return;
  const k = String(name).toLowerCase();
  persisted.dislikes = persisted.dislikes.filter((d) => d.toLowerCase() !== k);
  persisted.dislikes.unshift(name);
  persisted.dislikes = persisted.dislikes.slice(0, 200);
  savePersisted();
}
function isDisliked(name) {
  const k = String(name || '').toLowerCase();
  return persisted.dislikes.some((d) => d.toLowerCase() === k);
}
function addRecentPick(name) {
  if (!name) return;
  const k = String(name).toLowerCase();
  persisted.recentPicks = persisted.recentPicks.filter((d) => d.toLowerCase() !== k);
  persisted.recentPicks.unshift(name);
  persisted.recentPicks = persisted.recentPicks.slice(0, 10);
  savePersisted();
}
function isRecentlyPicked(name) {
  const k = String(name || '').toLowerCase();
  return persisted.recentPicks.some((d) => d.toLowerCase() === k);
}
loadPersisted();

/* ============================================================
   Time-of-day / context defaults
============================================================ */
function timeOfDayDefaults() {
  const h = new Date().getHours();
  if (h < 11)  return { moodHint: 'classic',     healthHint: 'balanced', period: 'morning' };
  if (h < 14)  return { moodHint: 'light',       healthHint: 'balanced', period: 'lunch' };
  if (h < 17)  return { moodHint: 'light',       healthHint: 'balanced', period: 'snack' };
  if (h < 21)  return { moodHint: 'comfort',     healthHint: 'balanced', period: 'dinner' };
  return         { moodHint: 'comfort',     healthHint: 'indulgent',  period: 'late night' };
}

/* ============================================================
   Avoid matching (predefined + custom typed list + persistent dislikes)
============================================================ */
function getCustomAvoidKeywords() {
  const raw = (state.answers && state.answers.avoidCustom) || '';
  return String(raw).split(/[,\n;]/).map((s) => s.trim().toLowerCase()).filter((s) => s.length >= 2);
}

function avoidsMatch(text, avoid) {
  const t = ' ' + String(text).toLowerCase() + ' ';
  if (avoid && avoid.length) {
    for (const a of avoid) {
      const kws = AVOID_KEYWORDS[a] || [];
      for (const kw of kws) {
        if (t.includes(kw.toLowerCase())) return true;
      }
    }
  }
  const custom = getCustomAvoidKeywords();
  for (const kw of custom) if (t.includes(kw)) return true;
  return false;
}
function ingredientsBlocked(ings, avoid) {
  if (!ings) return false;
  for (const ing of ings) if (avoidsMatch(ing, avoid)) return true;
  return false;
}

/* ============================================================
   Macro / target distance
============================================================ */
function macroDistance(profile, targets) {
  const p = profile || {};
  let total = 0, count = 0;
  if (targets.kcal) { total += Math.abs((p.kcal || 0) - targets.kcal) / Math.max(targets.kcal, 1); count++; }
  if (targets.p)    { total += Math.abs((p.p    || 0) - targets.p)    / Math.max(targets.p, 1);    count++; }
  if (targets.c)    { total += Math.abs((p.c    || 0) - targets.c)    / Math.max(targets.c, 1);    count++; }
  if (targets.f)    { total += Math.abs((p.f    || 0) - targets.f)    / Math.max(targets.f, 1);    count++; }
  return count ? total / count : 0;
}

/* ============================================================
   Cuisine + dish candidate selection
============================================================ */
function pickCuisineKey(answers) {
  if (answers.cuisine && answers.cuisine !== 'surprise' && FOOD_DATA[answers.cuisine]) {
    return answers.cuisine;
  }
  const avoid = answers.avoid || [];
  const candidates = Object.keys(FOOD_DATA).filter((k) =>
    FOOD_DATA[k].dishes.some((d) => !avoidsMatch(d.name, avoid) && !isDisliked(d.name))
  );
  if (state.targets) {
    const fitCandidates = candidates.filter((k) =>
      FOOD_DATA[k].dishes.some((d) =>
        !avoidsMatch(d.name, avoid) && !isDisliked(d.name) &&
        macroDistance(getProfile(d.prof), state.targets) < 0.4
      )
    );
    if (fitCandidates.length) return pickRandom(fitCandidates);
  }
  return pickRandom(candidates.length ? candidates : Object.keys(FOOD_DATA));
}

function rankByTargets(items, targets) {
  return items.slice().sort((a, b) =>
    macroDistance(getProfile(a.prof), targets) - macroDistance(getProfile(b.prof), targets)
  );
}

function dishMatchesShortcut(dish, shortcut) {
  if (!shortcut) return true;
  const name = (dish.name || '').toLowerCase();
  if (shortcut.preferDishes && shortcut.preferDishes.length) {
    return shortcut.preferDishes.some((kw) => name.includes(kw));
  }
  if (shortcut.preferProf && shortcut.preferProf.length) {
    return shortcut.preferProf.includes(dish.prof);
  }
  return true;
}

function buildDishCandidates(answers) {
  const cuisineKey = pickCuisineKey(answers);
  const data = FOOD_DATA[cuisineKey];
  const moodTag = answers.mood;
  const healthTag = answers.health;
  const avoid = answers.avoid || [];
  const shortcut = state.shortcut;

  // Layered filtering: prefer tighter matches, fall back to broader
  let pool = data.dishes.filter((d) =>
    (d.tags.includes(moodTag) || d.tags.includes(healthTag)) &&
    !avoidsMatch(d.name, avoid) && !isDisliked(d.name)
  );
  if (pool.length < 4) {
    pool = data.dishes.filter((d) => !avoidsMatch(d.name, avoid) && !isDisliked(d.name));
  }

  // Shortcut preferences boost matching dishes to the front
  if (shortcut) {
    const preferred = pool.filter((d) => dishMatchesShortcut(d, shortcut));
    const others = pool.filter((d) => !dishMatchesShortcut(d, shortcut));
    pool = [...shuffle(preferred.slice()), ...shuffle(others.slice())];
  } else if (state.targets) {
    pool = rankByTargets(pool, state.targets);
  } else {
    pool = shuffle(pool.slice());
  }

  // Deprioritize (but don't drop) recently-picked dishes
  pool.sort((a, b) => {
    const ar = isRecentlyPicked(a.name) ? 1 : 0;
    const br = isRecentlyPicked(b.name) ? 1 : 0;
    return ar - br;
  });

  const candidates = pool.slice(0, 8).map((d) => ({
    name: d.name,
    prof: d.prof,
    tags: d.tags,
    profile: getProfile(d.prof),
    cuisineKey,
    cuisineLabel: data.label,
  }));

  return { candidates, cuisineKey, cuisineData: data };
}

function buildRecipeCandidates(answers) {
  const cuisineKey = pickCuisineKey(answers);
  const data = FOOD_DATA[cuisineKey];
  const moodTag = answers.mood;
  const healthTag = answers.health;
  const avoid = answers.avoid || [];
  const shortcut = state.shortcut;

  let pool = data.recipes.filter((r) =>
    (r.tags.includes(moodTag) || r.tags.includes(healthTag)) &&
    !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid) &&
    !isDisliked(r.name)
  );
  if (pool.length < 3) {
    pool = data.recipes.filter((r) =>
      !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid) && !isDisliked(r.name)
    );
  }
  if (pool.length < 3) {
    const all = [];
    Object.values(FOOD_DATA).forEach((d) => d.recipes.forEach((r) => all.push(r)));
    pool = all.filter((r) =>
      !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid) && !isDisliked(r.name)
    );
  }

  if (shortcut) {
    const preferred = pool.filter((r) => dishMatchesShortcut(r, shortcut));
    const others = pool.filter((r) => !dishMatchesShortcut(r, shortcut));
    pool = [...shuffle(preferred.slice()), ...shuffle(others.slice())];
  } else if (state.targets) {
    pool = rankByTargets(pool, state.targets);
  } else {
    pool = shuffle(pool.slice());
  }

  pool.sort((a, b) => {
    const ar = isRecentlyPicked(a.name) ? 1 : 0;
    const br = isRecentlyPicked(b.name) ? 1 : 0;
    return ar - br;
  });

  const candidates = pool.slice(0, 6).map((r) => ({
    name: r.name,
    brief: r.brief,
    ingredients: r.ingredients,
    prof: r.prof,
    tags: r.tags,
    profile: getProfile(r.prof),
    cuisineKey,
    cuisineLabel: data.label,
  }));

  return { candidates, cuisineKey, cuisineData: data };
}

/* ============================================================
   Reasoning generator (the "because you said..." line)
============================================================ */
function buildReasoning(dish, answers) {
  const bits = [];
  const moodWords = { comfort: 'comfort food', light: 'something light', adventurous: 'adventurous', classic: 'a classic' };
  const healthWords = { healthy: 'healthy', balanced: 'balanced', indulgent: 'indulgence' };
  if (answers.mood) bits.push(moodWords[answers.mood] || answers.mood);
  if (answers.health) bits.push(healthWords[answers.health] || answers.health);
  if (answers.vibe === 'date')   bits.push('date night');
  if (answers.vibe === 'family') bits.push('feeding the family');
  if (answers.vibe === 'group')  bits.push('a group meal');
  if (answers.vibe === 'solo' && bits.length === 0) bits.push('solo dinner');
  if (state.targets && state.targets.kcal) bits.push(`~${state.targets.kcal} kcal`);
  if (state.shortcut) {
    const label = state.shortcut.label.toLowerCase();
    if (!bits.some(b => b.includes(label))) bits.unshift(label);
  }
  const pieces = bits.slice(0, 3);
  if (!pieces.length) return `Because it fits your ${dish.cuisineLabel.toLowerCase()} vibe.`;
  return `Because you said ${pieces.join(' + ')}.`;
}

/* ============================================================
   Build a search-query set for cook mode (from earlier feature)
============================================================ */
function buildRecipeSearches(answers, rec) {
  const cuisineLabel = rec.cuisineLabel || '';
  const cuisineLower = cuisineLabel.toLowerCase();
  const searches = [];

  const moodWord = ({
    comfort: 'comfort food', light: 'light', adventurous: 'adventurous', classic: 'classic weeknight',
  })[answers.mood] || '';

  if (cuisineLower) {
    searches.push({ label: `${capitalize(moodWord || 'easy')} ${cuisineLabel} recipes`,
      query: `easy ${moodWord} ${cuisineLower} recipes`.replace(/\s+/g, ' ').trim() });
  }
  searches.push({ label: `30-minute ${cuisineLabel || 'weeknight'} recipes`, query: `30 minute ${cuisineLower} recipes`.trim() });
  if (answers.health === 'healthy') searches.push({ label: `Healthy ${cuisineLabel} recipes`, query: `healthy ${cuisineLower} dinner recipes`.trim() });
  else if (answers.health === 'indulgent') searches.push({ label: `Best indulgent ${cuisineLabel} dishes`, query: `best indulgent ${cuisineLower} comfort food recipes`.trim() });

  if (answers.vibe === 'date')   searches.push({ label: `${cuisineLabel} date night recipes`,     query: `${cuisineLower} date night dinner recipes impressive`.trim() });
  if (answers.vibe === 'family') searches.push({ label: `Kid-friendly ${cuisineLabel} recipes`,   query: `kid friendly family ${cuisineLower} dinner recipes`.trim() });
  if (answers.vibe === 'group')  searches.push({ label: `${cuisineLabel} recipes for a crowd`,    query: `${cuisineLower} recipes for a crowd party feeding many`.trim() });
  if (answers.vibe === 'solo')   searches.push({ label: `${cuisineLabel} recipes for one`,        query: `${cuisineLower} recipes for one solo cooking small batch`.trim() });

  const avoid = Array.isArray(answers.avoid) ? answers.avoid : [];
  const dietParts = [];
  if (avoid.includes('gluten')) dietParts.push('gluten-free');
  if (avoid.includes('dairy'))  dietParts.push('dairy-free');
  if (avoid.includes('nuts'))   dietParts.push('nut-free');
  if (avoid.includes('eggs'))   dietParts.push('egg-free');
  const noProtein = avoid.includes('red-meat') && avoid.includes('pork');
  const noSea = avoid.includes('seafood') && avoid.includes('shellfish');
  if (noProtein && noSea) dietParts.push('vegetarian');
  else if (noProtein) dietParts.push('pescatarian');
  if (dietParts.length) searches.push({ label: `${capitalize(dietParts.join(' '))} ${cuisineLabel} recipes`, query: `${dietParts.join(' ')} ${cuisineLower} recipes`.trim() });

  if (state.targets) {
    if (state.targets.kcal) searches.push({ label: `${cuisineLabel} recipes under ${state.targets.kcal} calories`, query: `${cuisineLower} recipes under ${state.targets.kcal} calories per serving`.trim() });
    if (state.targets.p && state.targets.p >= 30) searches.push({ label: `High-protein ${cuisineLabel} recipes`, query: `high protein ${cuisineLower} recipes ${state.targets.p}g protein`.trim() });
    if (state.targets.c && state.targets.c <= 40) searches.push({ label: `Low-carb ${cuisineLabel} recipes`,    query: `low carb ${cuisineLower} recipes`.trim() });
  }

  const customs = String(answers.avoidCustom || '').split(/[,;\n]/).map(s => s.trim()).filter(s => s.length >= 2);
  if (customs.length) {
    const noStr = customs.slice(0, 4).map(c => `-"${c}"`).join(' ');
    searches.push({ label: `${cuisineLabel} recipes without ${customs.slice(0, 3).join(', ')}`, query: `${cuisineLower} recipes ${noStr}`.replace(/\s+/g, ' ').trim() });
  }

  const seen = new Set();
  return searches.filter((s) => {
    if (!s.query) return false;
    if (seen.has(s.query)) return false;
    seen.add(s.query); return true;
  }).slice(0, 7);
}

/* ============================================================
   Price tier estimation (Google-style $ / $$ / $$$)
============================================================ */
function budgetToTier(budget) { return budget === '$' ? 1 : budget === '$$' ? 2 : budget === '$$$' ? 3 : null; }
function tierToDollars(tier) {
  if (!tier || tier < 1) return '';
  return '$'.repeat(Math.max(1, Math.min(3, Math.round(tier))));
}
function estimatePriceTier(tags) {
  const explicitKeys = ['price:level', 'price_range', 'price', 'fee:level'];
  for (const k of explicitKeys) {
    const v = tags[k]; if (!v) continue;
    const s = String(v).toLowerCase().trim();
    if (s === '$'  || s === '1' || /\b(low|cheap|budget|inexpensive)\b/.test(s)) return { tier: 1, confident: true };
    if (s === '$$$'|| s === '3' || /\b(high|expensive|fine[\s_-]?dining|upscale|premium)\b/.test(s)) return { tier: 3, confident: true };
    if (s === '$$' || s === '2' || /\b(mid|medium|moderate|average)\b/.test(s)) return { tier: 2, confident: true };
    const dollarMatch = s.match(/^\$+$/);
    if (dollarMatch) {
      const n = Math.max(1, Math.min(3, dollarMatch[0].length));
      return { tier: n, confident: true };
    }
  }
  const amenity = String(tags.amenity || '').toLowerCase();
  const cuisine = String(tags.cuisine || '').toLowerCase();
  const name    = String(tags.name || '').toLowerCase();
  const highEndCuisines = ['fine_dining','french','molecular','tasting_menu','steak_house','steakhouse'];
  const highEndKeywords = ['steakhouse','steak house','fine dining','tasting menu',"chef's table",'omakase','michelin','prime','reserve','wine room'];
  if (highEndCuisines.some(t => cuisine.includes(t))) {
    if (cuisine.includes('omakase') || cuisine.includes('fine_dining') || cuisine.includes('french') || cuisine.includes('molecular') || cuisine.includes('tasting')) return { tier: 3, confident: false };
  }
  if (highEndKeywords.some(k => name.includes(k))) return { tier: 3, confident: false };
  if (amenity === 'fast_food') return { tier: 1, confident: true };
  const cheapKeywords = ['express','truck','diner','taqueria','dollar','value','snack','quick','cantina','drive-thru','drive thru'];
  if (cheapKeywords.some(k => name.includes(k))) return { tier: 1, confident: false };
  const cheapCuisines = ['burger','pizza','sandwich','kebab','doughnut','fish_and_chips','breakfast','noodle','ice_cream'];
  if (amenity === 'cafe') return { tier: 1, confident: false };
  if (cheapCuisines.some(t => cuisine.includes(t)) && amenity !== 'restaurant') return { tier: 1, confident: false };
  return { tier: 2, confident: false };
}

/* ============================================================
   Rendering helpers
============================================================ */
const main = document.getElementById('main');
const progressEl = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const progressStep = document.getElementById('progressStep');
const progressTotal = document.getElementById('progressTotal');

function setProgress(step, total) {
  if (step < 0 || step >= total) {
    progressEl.classList.add('hidden');
    progressLabel.style.display = 'none';
  } else {
    progressEl.classList.remove('hidden');
    progressLabel.style.display = 'flex';
    const pct = ((step + 1) / total) * 100;
    progressBar.style.width = pct + '%';
    progressStep.textContent = `Question ${step + 1} of ${total}`;
    progressTotal.textContent = `${Math.round(pct)}%`;
  }
}

function transitionTo(renderFn) {
  const current = main.firstElementChild;
  if (current) {
    current.classList.add('leaving');
    setTimeout(() => { main.innerHTML = ''; renderFn(); }, 220);
  } else {
    main.innerHTML = ''; renderFn();
  }
}

    btn.addEventListener('click', () => startShortcut(sc));
    grid.appendChild(btn);
  });
}

/* ============================================================
   Path: Quick mode (3 questions)
============================================================ */
function startQuickMode() {
  state.flow = 'quick';
  state.shortcut = null;
  state.answers = {};
  state.step = 0;
  // Apply time-of-day defaults that the user didn't override
  const tod = timeOfDayDefaults();
  state.answers._timeOfDay = tod.period;
  transitionTo(renderQuickQuestion);
}

function renderQuickQuestion() {
  const q = QUICK_QUESTIONS[state.step];
  setProgress(state.step, QUICK_QUESTIONS.length);

  const el = document.createElement('div');
  el.className = 'screen';
  const optionsClass = q.layout === 'cols' ? 'options cols-2' : 'options';
  const current = state.answers[q.id] ?? null;

  el.innerHTML = `
    <div class="q-eyebrow">${q.eyebrow}</div>
    <h2 class="q-title serif">${q.title}</h2>
    ${q.sub ? `<p class="q-sub">${q.sub}</p>` : '<div style="margin-bottom:18px"></div>'}
    <div class="${optionsClass}" id="opts"></div>
    <div class="nav-row">
      <button id="backBtn" class="btn btn-ghost">← Back</button>
      <button id="nextBtn" class="btn" ${current === null ? 'disabled' : ''}>
        ${state.step === QUICK_QUESTIONS.length - 1 ? 'Find food →' : 'Next →'}
      </button>
    </div>
  `;
  main.appendChild(el);

  const optsEl = document.getElementById('opts');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.style.animationDelay = (i * 35) + 'ms';
    if (current === opt.value) btn.classList.add('selected');
    btn.innerHTML = `
      <span class="opt-emoji">${opt.emoji}</span>
      <span class="opt-content">
        <span class="opt-label">${opt.label}</span>
        ${opt.desc ? `<span class="opt-desc">${opt.desc}</span>` : ''}
      </span>
    `;
    btn.addEventListener('click', () => {
      state.answers[q.id] = opt.value;
      setTimeout(() => quickAdvance(), 220);
    });
    optsEl.appendChild(btn);
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    if (state.step > 0) { state.step--; transitionTo(renderQuickQuestion); }
    else { transitionTo(renderWelcome); }
  });
  document.getElementById('nextBtn').addEventListener('click', quickAdvance);
}

function quickAdvance() {
  const q = QUICK_QUESTIONS[state.step];
  if (state.answers[q.id] == null) return;
  if (state.step < QUICK_QUESTIONS.length - 1) {
    state.step++;
    transitionTo(renderQuickQuestion);
  } else {
    finalizeQuickAnswers();
    proceedToOutcome();
  }
}

function finalizeQuickAnswers() {
  // Fill in defaults from time-of-day where missing
  const tod = timeOfDayDefaults();
  if (!state.answers.mood)   state.answers.mood   = tod.moodHint;
  if (!state.answers.health) state.answers.health = tod.healthHint;
  if (!state.answers.cuisine) state.answers.cuisine = 'surprise';
  if (!state.answers.budget) state.answers.budget = '$$';
  if (!state.answers.avoid)  state.answers.avoid  = [];
  // Distance default based on format
  if (!state.answers.distance) {
    state.answers.distance = (state.answers.format === 'cook') ? 'any'
      : (state.answers.time === 'rush' ? '1' : state.answers.time === 'quick' ? '3' : 'any');
  }
}

/* ============================================================
   Path: Themed shortcut (preset answers, jump to result)
============================================================ */
function startShortcut(shortcut) {
  state.flow = 'shortcut';
  state.shortcut = shortcut;
  state.answers = Object.assign({}, shortcut.answers || {});
  // Fill in missing defaults
  const tod = timeOfDayDefaults();
  if (!state.answers.mood)   state.answers.mood   = tod.moodHint;
  if (!state.answers.health) state.answers.health = tod.healthHint;
  if (!state.answers.cuisine) state.answers.cuisine = 'surprise';
  if (!state.answers.budget) state.answers.budget = '$$';
  if (!state.answers.avoid)  state.answers.avoid  = shortcut.answers && shortcut.answers.avoid ? shortcut.answers.avoid : [];
  if (!state.answers.format) state.answers.format = 'cook';
  if (!state.answers.vibe)   state.answers.vibe   = 'solo';
  if (!state.answers.distance) state.answers.distance = '3';
  proceedToOutcome();
}

/* ============================================================
   Path: Full custom mode (existing 8-question flow)
============================================================ */
function startFullMode() {
  state.flow = 'full';
  state.shortcut = null;
  state.answers = {};
  state.step = 0;
  transitionTo(renderTargets);
}

function renderTargets() {
  setProgress(-1, QUESTIONS.length);
  const t = state.targets || {};
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `

    <div class="targets-hint"><strong>Per-meal numbers</strong>, not daily. Typical dinner is around 500–800 kcal. Skip if you don't care about counting tonight.</div>

  ['t-kcal','t-p','t-c','t-f'].forEach((id) => {

  document.getElementById('nextBtn').addEventListener('click', saveTargetsAndContinue);

function saveTargetsAndContinue() {
  const parse = (id) => {
    const el = document.getElementById(id);
    if (!el) return null;
    const v = (el.value || '').trim();
    if (v === '') return null;
    const n = parseFloat(v);
    return isFinite(n) && n > 0 ? Math.round(n) : null;
  };
  const kcal = parse('t-kcal'); const p = parse('t-p'); const c = parse('t-c'); const f = parse('t-f');
  if (kcal == null && p == null && c == null && f == null) {
    state.targets = null;
  } else {
    state.targets = {};
    if (kcal != null) state.targets.kcal = kcal;
    if (p != null) state.targets.p = p;
    if (c != null) state.targets.c = c;
    if (f != null) state.targets.f = f;
  }
  state.step = 0;
  transitionTo(renderQuestion);
}

function shouldSkipQuestion(q) {
  return q.id === 'distance' && state.answers.format === 'cook';
}
function getVisibleTotal() { return QUESTIONS.filter((q) => !shouldSkipQuestion(q)).length; }
function getVisibleStep(step) {
  let count = 0;
  for (let i = 0; i <= step && i < QUESTIONS.length; i++) if (!shouldSkipQuestion(QUESTIONS[i])) count++;
  return count - 1;
}
function nextVisibleStep(from) {
  let i = from + 1;
  while (i < QUESTIONS.length && shouldSkipQuestion(QUESTIONS[i])) i++;
  return i < QUESTIONS.length ? i : -1;
}
function prevVisibleStep(from) {
  let i = from - 1;
  while (i >= 0 && shouldSkipQuestion(QUESTIONS[i])) i--;
  return i;
}
function lastVisibleQuestionIndex() {
  for (let i = QUESTIONS.length - 1; i >= 0; i--) if (!shouldSkipQuestion(QUESTIONS[i])) return i;
  return QUESTIONS.length - 1;
}

function targetBannerHtml() {
  const t = state.targets;
  const parts = [];
  if (t.kcal) parts.push(`<span class="num">${t.kcal}</span> kcal`);
  if (t.p) parts.push(`<span class="num">${t.p}</span>g protein`);
  if (t.c) parts.push(`<span class="num">${t.c}</span>g carbs`);
  if (t.f) parts.push(`<span class="num">${t.f}</span>g fat`);
  return `<div class="target-banner"><span class="label">Targeting</span> ${parts.join(' · ')}</div>`;
}

function renderQuestion() {
  const q = QUESTIONS[state.step];
  setProgress(getVisibleStep(state.step), getVisibleTotal());

  // Defensively clear — chip toggles re-render in place without going through transitionTo
  main.innerHTML = '';

  const el = document.createElement('div');
  el.className = 'screen';
  const optionsClass = q.layout === 'chips' ? 'options chips' : (q.layout === 'cols' ? 'options cols-2' : 'options');
  const isMulti = q.type === 'multi';
  const current = state.answers[q.id] ?? (isMulti ? [] : null);
  const isLastVisible = nextVisibleStep(state.step) === -1;

  const customAvoidHtml = q.id === 'avoid' ? `
    <div class="custom-avoid-label">Anything else?</div>
    <input id="avoidCustom" type="text" class="custom-avoid"
           placeholder="Type other foods to avoid — e.g. cilantro, blue cheese, mushrooms"
           value="${escapeHtml(state.answers.avoidCustom || '')}"
           autocomplete="off" spellcheck="false" />
  ` : '';

  el.innerHTML = `
    <div class="q-eyebrow">${q.eyebrow}</div>
    <h2 class="q-title serif">${q.title}</h2>
    <p class="q-sub">${q.sub}</p>
    <div class="${optionsClass}" id="opts"></div>
    ${customAvoidHtml}
    ${state.targets ? targetBannerHtml() : ''}
    <div class="nav-row">
      <button id="backBtn" class="btn btn-ghost">← Back</button>
      <div style="display:flex; gap:10px; align-items:center;">
        ${q.optional ? '<button id="skipBtn" class="btn-link">Skip</button>' : ''}
        <button id="nextBtn" class="btn" ${(!isMulti && current === null) ? 'disabled' : ''}>
          ${isLastVisible ? 'Find food →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
  main.appendChild(el);

  const optsEl = document.getElementById('opts');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (q.layout === 'chips' ? ' chip' : '');
    btn.style.animationDelay = (i * 35) + 'ms';
    const selected = isMulti ? Array.isArray(current) && current.includes(opt.value) : current === opt.value;
    if (selected) btn.classList.add('selected');
    btn.innerHTML = `
      <span class="opt-emoji">${opt.emoji}</span>
      <span class="opt-content">
        <span class="opt-label">${opt.label}</span>
        ${opt.desc ? `<span class="opt-desc">${opt.desc}</span>` : ''}
      </span>
    `;
    btn.addEventListener('click', () => onOptionPick(q, opt));
    optsEl.appendChild(btn);
  });

  const avoidInput = document.getElementById('avoidCustom');
  if (avoidInput) {
    avoidInput.addEventListener('input', (e) => { state.answers.avoidCustom = e.target.value; });
    avoidInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); advanceFull(q); } });
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    const prev = prevVisibleStep(state.step);
    if (prev >= 0) { state.step = prev; transitionTo(renderQuestion); }
    else { transitionTo(renderTargets); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => advanceFull(q));
  if (q.optional) {
    document.getElementById('skipBtn').addEventListener('click', () => {
      if (isMulti) state.answers[q.id] = []; else state.answers[q.id] = null;
      advanceFull(q);
    });
  }
}

function onOptionPick(q, opt) {
  if (q.type === 'multi') {
    const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
    const idx = cur.indexOf(opt.value);
    if (idx >= 0) cur.splice(idx, 1); else cur.push(opt.value);
    state.answers[q.id] = cur;
    renderQuestion();
  } else {
    state.answers[q.id] = opt.value;
    setTimeout(() => advanceFull(q), 220);
  }
}

function advanceFull(q) {
  const next = nextVisibleStep(state.step);
  if (next >= 0) { state.step = next; transitionTo(renderQuestion); }
  else { proceedToOutcome(); }
}

/* ============================================================
   Common: proceed to outcome (location → loading → results)

}
function setLocStatus(msg) { const s = document.getElementById('locStatus'); if (s) s.textContent = msg || ''; }
function requestGeolocation() {
  if (!('geolocation' in navigator)) { setLocStatus("Your browser doesn't support geolocation — try ZIP instead."); return; }
  setLocStatus('Asking your browser…');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.coords = { lat: pos.coords.latitude, lon: pos.coords.longitude, label: 'your location' };
      transitionTo(renderLoading); runRecommendation();
    },
    (err) => { console.warn(err); setLocStatus("Couldn't get location — type a ZIP or city below."); },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
  );
}
async function useZip() {
  const input = document.getElementById('zipInput');
  const q = (input.value || '').trim();
  if (!q) { setLocStatus('Type a ZIP code or city first.'); return; }
  setLocStatus('Looking that up…');
  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q);
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) { setLocStatus("Couldn't find that place. Try a different ZIP or city."); return; }
    state.coords = {
      lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon),
      label: data[0].display_name?.split(',').slice(0, 2).join(',') || q,
    };
    transitionTo(renderLoading); runRecommendation();
  } catch (e) { console.error(e); setLocStatus('Lookup failed. Check your connection and try again.'); }
}

/* ============================================================
   Recommendation flow
============================================================ */
async function runRecommendation() {
  const isCook = state.answers.format === 'cook';
  const startedAt = Date.now();
  const MIN_DWELL = 1100;
  try {
    if (isCook) {
      const { candidates, cuisineKey, cuisineData } = buildRecipeCandidates(state.answers);
      state.candidates = candidates;
      state.heroIndex = 0;
      state.recommendation = { mode: 'cook', cuisineKey, cuisineLabel: cuisineData.label, queries: cuisineData.queries };
      await holdAtLeast(startedAt, MIN_DWELL);
      stopLoading();
      transitionTo(renderRecipeResults);
    } else {
      const { candidates, cuisineKey, cuisineData } = buildDishCandidates(state.answers);
      state.candidates = candidates;
      state.heroIndex = 0;
      state.recommendation = {
        mode: 'eat-out', cuisineKey, cuisineLabel: cuisineData.label,
        queries: cuisineData.queries, cuisine_tags: cuisineData.osm,
      };
      const places = await findPlaces(state.recommendation);
      state.places = places;
      await holdAtLeast(startedAt, MIN_DWELL);
      stopLoading();
      transitionTo(renderRestaurantResults);
    }
  } catch (err) {
    console.error(err); stopLoading();
    transitionTo(() => renderError('Something went sideways.', err.message || "We couldn't pull nearby places. Try again, or change your distance."));
  }
}
function holdAtLeast(startedAt, ms) {
  const elapsed = Date.now() - startedAt;
  return new Promise((resolve) => setTimeout(resolve, Math.max(0, ms - elapsed)));
}

/* ============================================================
   Overpass restaurant search
============================================================ */
async function findPlaces(rec) {
  if (!state.coords) return [];
  const distChoice = state.answers.distance;
  const radiusMeters = distChoice === '1' ? 1600 : distChoice === '3' ? 4800 : 12000;
  const radiusMi = radiusMeters / 1609.34;
  const cuisineTags = (rec.cuisine_tags || []).map((t) => String(t).toLowerCase().trim()).filter(Boolean);
  const { lat, lon } = state.coords;
  const cuisineRegex = cuisineTags.length ? cuisineTags.map(escapeRegex).join('|') : null;
  const cuisineFilter = cuisineRegex ? `["cuisine"~"${cuisineRegex}",i]` : '';
  const query = `
    [out:json][timeout:20];
    (node["amenity"~"restaurant|fast_food|cafe"]${cuisineFilter}(around:${radiusMeters},${lat},${lon}););
    out body 40;
  `;
  let elements = [];
  try {
    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(query),
    });
    if (r.ok) { const data = await r.json(); elements = (data.elements || []).filter((e) => e.tags && e.tags.name); }
  } catch (e) { console.warn('Overpass failed', e); }
  if (elements.length === 0 && cuisineRegex) {
    try {
      const fallbackQ = `
        [out:json][timeout:20];
        (node["amenity"~"restaurant|fast_food|cafe"](around:${radiusMeters},${lat},${lon}););
        out body 40;
      `;
      const r = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(fallbackQ),
      });
      if (r.ok) { const data = await r.json(); elements = (data.elements || []).filter((e) => e.tags && e.tags.name); }
    } catch {}
  }
  const targetTier = budgetToTier(state.answers.budget);
  let scored = elements.map((e) => {
    const distMi = haversine(lat, lon, e.lat, e.lon);
    const tagCuisine = (e.tags.cuisine || '').toLowerCase();
    const priceEst = estimatePriceTier(e.tags);
    const distRatio = distMi / radiusMi;
    let score = -14 * distRatio * distRatio;
    if (cuisineTags.length) for (const t of cuisineTags) if (tagCuisine.includes(t)) { score += 6; break; }
    if (targetTier) {
      const diff = Math.abs(priceEst.tier - targetTier);
      if (diff === 0) score += 8;
      else if (diff === 1) score += 2;
      else score -= 6;
    }
    return {
      name: e.tags.name,
      cuisine: tagCuisine.replace(/_/g, ' ').replace(/;/g, ', ') || null,
      lat: e.lat, lon: e.lon, distMi,
      amenity: e.tags.amenity,
      priceTier: priceEst.tier, priceConfident: priceEst.confident,
      score,
    };
  });
  if (targetTier) {
    const close = scored.filter((p) => Math.abs(p.priceTier - targetTier) <= 1);
    if (close.length >= 3) scored = close;
  }
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 8);
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8; const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1); const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

/* ============================================================
   Delivery deep links
============================================================ */
function deliveryLinksFor(place) {
  const q = encodeURIComponent(place.name);
  return [
    { label: 'DoorDash',  url: `https://www.doordash.com/search/store/${q}/` },
    { label: 'Uber Eats', url: `https://www.ubereats.com/search?q=${q}` },
    { label: 'Grubhub',   url: `https://www.grubhub.com/search?queryText=${q}` },
  ];
}

/* ============================================================
   Hard-filter badge
============================================================ */
function filterBadgeHtml() {
  const labels = [];
  (state.answers.avoid || []).forEach((a) => { if (AVOID_LABELS[a]) labels.push(AVOID_LABELS[a]); });
  const customs = String(state.answers.avoidCustom || '').split(/[,;\n]/).map((s) => s.trim()).filter((s) => s.length >= 2);
  customs.forEach((c) => labels.push(c));
  if (!labels.length) return '';
  return `<div class="filter-badge"><span class="icon">✓</span>Filtered out: ${escapeHtml(labels.join(', '))}</div>`;
}

function macroPillsHtml(prof) {
  if (!prof) return '';

    <div class="hero-macros">

      <span class="pill"><span class="v">${prof.p}</span>g protein</span>

}

  const el = document.getElementById('resultsScreen');
  if (!el) return;

    heroHtml = `

    .slice(0, 4);
  const altsHtml = altCandidates.map(({ c, i }) => `
    <button class="alt-card" data-idx="${i}">
      <span class="alt-name">${escapeHtml(c.name)}</span>
      <span class="alt-macros">
        <span class="kcal">${c.profile.kcal}</span> kcal · ${c.profile.p}p / ${c.profile.c}c / ${c.profile.f}f
        <span class="swap-icon">↕</span>
      </span>
    </button>
  `).join('');

  // Places list
  let placesHtml = '';
  if (places.length === 0) {
    const fallbackQuery = (rec.queries && rec.queries[0]) || (rec.cuisine_tags && rec.cuisine_tags[0]) || 'restaurants';
    const url = state.coords
      ? `https://www.google.com/maps/search/${encodeURIComponent(fallbackQuery + ' near ' + state.coords.lat + ',' + state.coords.lon)}`
      : `https://www.google.com/maps/search/${encodeURIComponent(fallbackQuery)}`;
    placesHtml = `
      <div class="notice">Couldn't find specific matches in our nearby data — here's a Google Maps search ready to go:</div>
      <a class="place-card" href="${url}" target="_blank" rel="noopener">
        <div class="pin">🔎</div>
        <div class="place-body">
          <div class="place-name">Search "${escapeHtml(fallbackQuery)}" on Google Maps</div>
          <div class="place-meta">Opens in a new tab</div>
          <div class="place-action">★ Open Maps →</div>
        </div>
      </a>
    `;
  } else {
    placesHtml = places.map((p, i) => {
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + p.lat + ',' + p.lon)}`;
      const distLabel = p.distMi < 0.1 ? 'right here' : p.distMi.toFixed(1) + ' mi';
      const kindLabel = p.cuisine ? capitalize(p.cuisine) : (p.amenity === 'cafe' ? 'Café' : (p.amenity === 'fast_food' ? 'Fast casual' : 'Restaurant'));
      const dollars = tierToDollars(p.priceTier);
      const matches = targetTier && p.priceTier === targetTier;
      const guess = !p.priceConfident;
      const priceHtml = dollars ? `<span class="price${matches ? ' match' : ''}${guess ? ' guess' : ''}" title="${guess ? 'Estimated price tier' : 'Listed price tier'}">${dollars}${guess ? '*' : ''}</span>` : '';
      const parts = [];
      parts.push(`<span>${escapeHtml(kindLabel)}</span>`);
      if (priceHtml) parts.push(priceHtml);
      parts.push(`<span>${escapeHtml(distLabel)}</span>`);
      const metaHtml = parts.map((m, idx) => idx < parts.length - 1 ? m + '<span class="dot">·</span>' : m).join('');

      const showDelivery = state.answers.format === 'delivery' || state.answers.format === 'fast-casual';
      const deliveryHtml = showDelivery
        ? `<div class="delivery-pills">${deliveryLinksFor(p).map((d) =>
            `<a class="delivery-pill" href="${d.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(d.label)}</a>`
          ).join('')}</div>`
        : '';

      return `
        <a class="place-card" href="${mapsUrl}" target="_blank" rel="noopener" style="animation-delay:${i*55}ms;">
          <div class="pin">🍴</div>
          <div class="place-body">
            <div class="place-name">${escapeHtml(p.name)}</div>
            <div class="place-meta">${metaHtml}</div>
            ${deliveryHtml}
            <div class="place-action">★ Ratings & directions →</div>
          </div>
        </a>
      `;
    }).join('');
  }

  el.innerHTML = `
    ${heroHtml}
    ${altsHtml ? `<div class="section-title">Other ideas</div><div class="alt-list">${altsHtml}</div>` : ''}

    <div class="section-title">Nearby spots</div>
    <p class="section-sub">Tap any card to open Google Maps — that's where you'll see star ratings, reviews, photos, and hours.</p>
    ${placesHtml}

    <div class="results-actions">
      <button id="shareBtn" class="btn">${shareIconSvg()} Share</button>
      <button id="restartBtn" class="btn btn-ghost">Start over</button>
      <button id="backToQ" class="btn btn-ghost">Tweak my answers</button>
    </div>
  `;

  wireHeroAndAltHandlers();
  document.getElementById('shareBtn').addEventListener('click', () => shareResult('restaurants'));
  document.getElementById('restartBtn').addEventListener('click', restart);
  document.getElementById('backToQ').addEventListener('click', goBackToQuestions);
}

function wireHeroAndAltHandlers() {
  const anotherBtn = document.getElementById('anotherBtn');
  if (anotherBtn) anotherBtn.addEventListener('click', showAnotherHero);
  const dislikeBtn = document.getElementById('dislikeBtn');
  if (dislikeBtn) dislikeBtn.addEventListener('click', dislikeCurrentHero);
  const loveBtn = document.getElementById('loveBtn');
  if (loveBtn && loveBtn.tagName === 'BUTTON') loveBtn.addEventListener('click', loveCurrentHero);
  else if (loveBtn && loveBtn.tagName === 'A') loveBtn.addEventListener('click', () => loveCurrentHero(true));

  document.querySelectorAll('.alt-card').forEach((card) => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.getAttribute('data-idx'), 10);
      if (!isNaN(idx)) swapHeroTo(idx);
    });
  });
}

function showAnotherHero() {
  if (state.candidates.length <= 1) {
    showToast("That's the whole shortlist — try different answers.");
    return;
  }
  state.heroIndex = (state.heroIndex + 1) % state.candidates.length;
  repaintHeroOnly();
}

function dislikeCurrentHero() {
  const hero = currentHero();
  if (!hero) return;
  addDislike(hero.name);
  state.candidates.splice(state.heroIndex, 1);
  if (state.candidates.length === 0) {
    showToast("That was the last one — re-running.");
    setTimeout(() => {
      transitionTo(renderLoading);
      runRecommendation();
    }, 300);
    return;
  }
  if (state.heroIndex >= state.candidates.length) state.heroIndex = 0;
  showToast(`Got it. Won't show "${hero.name}" again.`);
  repaintHeroOnly();
}

function loveCurrentHero(isLink) {
  const hero = currentHero();
  if (!hero) return;
  addRecentPick(hero.name);
  if (!isLink) showToast(`Saved — enjoy your ${hero.name}.`);
}

function swapHeroTo(idx) {
  if (idx < 0 || idx >= state.candidates.length) return;
  state.heroIndex = idx;
  repaintHeroOnly();
}

function repaintHeroOnly() {
  // Repaint the whole results screen — simpler and ensures alts also update
  if (state.recommendation && state.recommendation.mode === 'cook') paintRecipeResults();
  else paintRestaurantResults();
}

function goBackToQuestions() {
  if (state.flow === 'quick' || state.shortcut) {
    // Reroute through full mode so the user can adjust details
    state.flow = 'full';
    state.shortcut = null;
    state.step = lastVisibleQuestionIndex();
    transitionTo(renderQuestion);
  } else if (state.flow === 'full' || state.flow === 'results') {
    state.flow = 'full';
    state.step = lastVisibleQuestionIndex();
    transitionTo(renderQuestion);
  } else {
    transitionTo(renderWelcome);
  }
}

   COUPLE / GROUP MODE — both swipe yes/no, first mutual yes wins

function startCoupleMode() {

  state.couple = { phase: 'setup', candidates: [], p1Yes: [], p2Yes: [], turnIndex: 0, currentPlayer: 1 };

}

function renderCoupleIntro() {

    </div>
  `;
  main.appendChild(el);

  const formatOpts = [
    { value: 'sit-down', emoji: '🍽️', label: 'Eat out' },
    { value: 'delivery', emoji: '🛵', label: 'Delivery' },
    { value: 'cook', emoji: '👨‍🍳', label: 'Cook at home' },
  ];
  const vibeOpts = [
    { value: 'date', emoji: '🌹', label: 'Date night' },
    { value: 'family', emoji: '👨‍👩‍👧', label: 'Family' },
    { value: 'group', emoji: '🥂', label: 'Friends' },
    { value: 'solo', emoji: '🧘', label: 'Just us' },
  ];

  function renderOptGroup(containerId, opts, key) {
    const c = document.getElementById(containerId);
    opts.forEach((opt) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      if (state.answers[key] === opt.value) btn.classList.add('selected');

        state.answers[key] = opt.value;

  document.getElementById('backBtn').addEventListener('click', () => transitionTo(renderWelcome));

}

async function startCoupleSwiping() {
  // Fill in defaults
  const tod = timeOfDayDefaults();
  if (!state.answers.mood) state.answers.mood = tod.moodHint;
  if (!state.answers.health) state.answers.health = 'balanced';
  if (!state.answers.cuisine) state.answers.cuisine = 'surprise';
  if (!state.answers.budget) state.answers.budget = '$$';
  if (!state.answers.avoid) state.answers.avoid = [];
  if (!state.answers.distance) state.answers.distance = '3';

  // Build candidates (dishes if eating out, recipes if cooking)
  const isCook = state.answers.format === 'cook';
  const { candidates } = isCook ? buildRecipeCandidates(state.answers) : buildDishCandidates(state.answers);
  const swipeable = candidates.slice(0, 6);
  if (swipeable.length < 2) {
    showToast("Not enough options — try different settings.");
    return;
  }
  state.couple.candidates = swipeable;
  state.couple.p1Yes = [];
  state.couple.p2Yes = [];
  state.couple.turnIndex = 0;
  state.couple.currentPlayer = 1;
  state.couple.phase = 'p1';
  transitionTo(renderCoupleHandoff);
}

function renderCoupleHandoff() {
  setProgress(-1, 1);
  const player = state.couple.currentPlayer;
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `
    <div class="couple-intro">
      <div class="icon">${player === 1 ? '👤' : '👥'}</div>
      <h2 class="serif">${player === 1 ? "Player 1's turn" : "Player 2's turn"}</h2>
      <p>${player === 1
        ? 'You go first. Swipe through 6 dishes — yes or no on each.'
        : 'Player 1 is done. Now you swipe the same 6. First mutual yes wins.'}</p>
      <p style="font-size:13px; color:var(--text-muted); margin-top:14px;">Pass the phone when ready.</p>
    </div>
    <div class="results-actions">
      <button id="goBtn" class="btn">I'm ready →</button>
      <button id="cancelBtn" class="btn btn-ghost">Cancel</button>
    </div>
  `;
  main.appendChild(el);
  document.getElementById('goBtn').addEventListener('click', () => transitionTo(renderCoupleSwipe));
  document.getElementById('cancelBtn').addEventListener('click', () => transitionTo(renderWelcome));
}

function renderCoupleSwipe() {
  setProgress(-1, 1);
  const c = state.couple;
  const candidate = c.candidates[c.turnIndex];
  if (!candidate) { finishCoupleTurn(); return; }

  const el = document.createElement('div');
  el.className = 'screen swipe-shell';
  el.innerHTML = `
    <div class="swipe-turn">${c.currentPlayer === 1 ? "Player 1" : "Player 2"}'s turn</div>
    <div class="swipe-counter">${c.turnIndex + 1} of ${c.candidates.length}</div>
    <div class="swipe-card" id="swipeCard">
      <h3>${escapeHtml(candidate.name)}</h3>
      <p class="brief">${escapeHtml(candidate.brief || `A ${candidate.cuisineLabel} dish — could be a winner.`)}</p>
    </div>
    <div class="swipe-actions">
      <button class="swipe-btn no" id="swipeNo" aria-label="No">✕</button>
      <button class="swipe-btn yes" id="swipeYes" aria-label="Yes">♥</button>
    </div>
    <p style="color:var(--text-muted); font-size:12px;">No = skip · Yes = I'd happily eat this</p>
  `;
  main.appendChild(el);

  document.getElementById('swipeNo').addEventListener('click', () => coupleVote(false));
  document.getElementById('swipeYes').addEventListener('click', () => coupleVote(true));
}

function coupleVote(yes) {
  const c = state.couple;
  if (yes) {
    if (c.currentPlayer === 1) c.p1Yes.push(c.turnIndex);
    else c.p2Yes.push(c.turnIndex);
  }
  c.turnIndex++;
  if (c.turnIndex >= c.candidates.length) { finishCoupleTurn(); }
  else { transitionTo(renderCoupleSwipe); }
}

function finishCoupleTurn() {
  const c = state.couple;
  if (c.currentPlayer === 1) {
    if (c.p1Yes.length === 0) {
      // P1 said no to everything — no point continuing
      transitionTo(() => renderCoupleResult(null, 'p1-nothing'));
      return;
    }
    c.currentPlayer = 2;
    c.turnIndex = 0;
    transitionTo(renderCoupleHandoff);
  } else {
    // Both turns done — find mutual yeses
    const mutual = c.p2Yes.filter((i) => c.p1Yes.includes(i));
    if (mutual.length === 0) {
      transitionTo(() => renderCoupleResult(null, 'no-match'));
    } else {
      const winnerIdx = mutual[0];
      transitionTo(() => renderCoupleResult(c.candidates[winnerIdx], 'matched'));
    }
  }
}

function renderCoupleResult(winner, status) {
  setProgress(-1, 1);
  const el = document.createElement('div');
  el.className = 'screen';

  if (status === 'matched' && winner) {
    state.candidates = [winner].concat(state.couple.candidates.filter((c) => c.name !== winner.name));
    state.heroIndex = 0;
    state.recommendation = {
      mode: state.answers.format === 'cook' ? 'cook' : 'eat-out',
      cuisineKey: winner.cuisineKey,
      cuisineLabel: winner.cuisineLabel,
      queries: (FOOD_DATA[winner.cuisineKey] || { queries: [] }).queries,
      cuisine_tags: (FOOD_DATA[winner.cuisineKey] || { osm: [] }).osm,
    };
    el.innerHTML = `
      <div class="hero-card">
        <div class="hero-eyebrow"><span>It's a match!</span></div>
        <div class="hero-title">${escapeHtml(winner.name)}</div>
        <div class="hero-brief">${escapeHtml(winner.brief || `A ${winner.cuisineLabel} dish you both said yes to.`)}</div>
        ${macroPillsHtml(winner.profile)}
        <div class="hero-actions">
          <button id="continueBtn" class="btn">${state.answers.format === 'cook' ? 'See the recipe →' : 'Find nearby spots →'}</button>
          <button id="restartBtn" class="btn btn-ghost">Start over</button>
        </div>
      </div>
    `;
  } else if (status === 'no-match') {
    el.innerHTML = `
      <div class="hero-card">
        <div class="hero-eyebrow"><span>No matches</span></div>
        <div class="hero-title">Nothing landed for both of you.</div>
        <div class="hero-brief">Want to try a different round, or just have one of you pick?</div>
        <div class="hero-actions">
          <button id="retryBtn" class="btn">Try again</button>
          <button id="soloBtn" class="btn btn-ghost">Let one person decide</button>
          <button id="restartBtn" class="btn btn-ghost">Start over</button>
        </div>
      </div>
    `;
  } else {
    el.innerHTML = `
      <div class="hero-card">
        <div class="hero-eyebrow"><span>Player 1 vetoed everything</span></div>
        <div class="hero-title">Tough crowd.</div>
        <div class="hero-brief">Let's try a different round with more options.</div>
        <div class="hero-actions">
          <button id="retryBtn" class="btn">Try again</button>
          <button id="restartBtn" class="btn btn-ghost">Start over</button>
        </div>
      </div>
    `;
  }
  main.appendChild(el);

  const continueBtn = document.getElementById('continueBtn');
  if (continueBtn) {
    continueBtn.addEventListener('click', () => {
      if (state.answers.format === 'cook') {
        transitionTo(renderRecipeResults);
      } else {
        transitionTo(renderLocation);
      }
    });
  }
  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) retryBtn.addEventListener('click', startCoupleSwiping);
  const soloBtn = document.getElementById('soloBtn');
  if (soloBtn) soloBtn.addEventListener('click', () => {
    // Fall back to single-player decide-for-me
    transitionTo(renderLoading);
    runRecommendation();
  });
  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', restart);
}

/* ============================================================
   Restart / share
============================================================ */
function restart() {
  state.flow = 'welcome';
  state.shortcut = null;
  state.step = 0;
  state.answers = {};
  state.targets = null;
  state.coords = null;
  state.recommendation = null;
  state.candidates = [];
  state.heroIndex = 0;
  state.places = [];
  state.couple = null;
  transitionTo(renderWelcome);
}

function shareIconSvg() {
  return `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>`;
}

function buildShareText(mode) {
  const hero = currentHero();
  const lines = ['🍴 What should I eat?'];
  if (hero) {
    lines.push('', `Tonight's pick: ${hero.name}`);
    if (hero.brief) lines.push(hero.brief);
    if (hero.profile) lines.push(`(~${hero.profile.kcal} kcal · ${hero.profile.p}p/${hero.profile.c}c/${hero.profile.f}f)`);
  }
  if (mode === 'restaurants') {
    const top = (state.places || []).slice(0, 3);
    if (top.length) {
      lines.push('', 'Top picks nearby:');
      top.forEach((p) => {
        const dist = p.distMi < 0.1 ? 'right here' : p.distMi.toFixed(1) + ' mi';
        const dollars = tierToDollars(p.priceTier);
        const price = dollars ? ` · ${dollars}${p.priceConfident ? '' : '*'}` : '';
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + p.lat + ',' + p.lon)}`;
        lines.push(`• ${p.name} (${dist}${price}) ${url}`);
      });
    }
  }
  return lines.join('\n');
}

async function shareResult(mode) {
  const text = buildShareText(mode);
  const shareData = { title: 'What Should I Eat?', text };
  try {
    if (navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
      await navigator.share(shareData); return;
    }
  } catch (err) { if (err && err.name === 'AbortError') return; }
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showToast('Copied — paste it to a friend'); return;
    }
  } catch {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied — paste it to a friend');
  } catch { showToast("Couldn't copy — long-press to select"); }
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  const m = document.getElementById('toastMsg');
  if (!toast || !m) return;
  m.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

/* ============================================================
   Helpers
============================================================ */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

document.getElementById('brand').addEventListener('click', restart);

/* ---------- Boot ---------- */
renderWelcome();
</script>
