<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1410" />
<title>What Should I Eat?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14100d;
    --bg-elev: #1f1813;
    --bg-card: #261d17;
    --bg-card-hover: #322519;
    --border: #3a2a1f;
    --border-strong: #5a4232;
    --text: #f5e9d8;
    --text-dim: #b8a48d;
    --text-muted: #8a7560;
    --terracotta: #d97757;
    --terracotta-deep: #b85a3d;
    --cream: #f5e9d8;
    --forest: #6b8a4a;
    --forest-deep: #4a6b3a;
    --gold: #d4a574;
    --shadow: 0 12px 40px rgba(0,0,0,0.5);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 15% 8%, rgba(217, 119, 87, 0.08), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(107, 138, 74, 0.07), transparent 45%);
    background-attachment: fixed;
  }
  h1, h2, h3, .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
    position: relative;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 6px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--cream);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--terracotta), var(--gold));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .brand small { color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-left: 6px;}

  .progress {
    margin-top: 10px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: opacity 0.3s ease;
  }
  .progress.hidden { opacity: 0; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--terracotta), var(--gold));
    width: 0%;
    transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }
  .progress-label {
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 0 40px;
    position: relative;
    min-height: 0;
  }

  .screen { animation: screenIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { to { opacity: 0; transform: translateY(-12px); } }
  .screen.leaving { animation: fadeOut 0.25s ease forwards; }

  .welcome { text-align: center; padding: 24px 0; }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 600;
    margin-bottom: 18px;
  }
  .welcome h1 {
    font-size: clamp(40px, 9vw, 64px);
    margin-bottom: 18px;
    color: var(--cream);
  }
  .welcome h1 em {
    font-style: italic;
    color: var(--terracotta);
    font-weight: 500;
  }
  .lede {
    font-size: 17px;
    color: var(--text-dim);
    max-width: 460px;
    margin: 0 auto 36px;
    line-height: 1.55;
  }
  .hero-art {
    width: 220px;
    height: 220px;
    margin: 0 auto 8px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, var(--gold), transparent 60%),
      radial-gradient(circle at 70% 70%, var(--terracotta), transparent 65%),
      radial-gradient(circle at 50% 50%, var(--forest-deep), var(--bg-elev));
    box-shadow: 0 20px 60px rgba(217,119,87,0.15), inset 0 0 40px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 92px;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .q-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .q-title {
    font-size: clamp(28px, 5.5vw, 40px);
    margin-bottom: 10px;
    color: var(--cream);
  }
  .q-sub {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 28px;
    line-height: 1.55;
  }

  .options { display: grid; gap: 10px; grid-template-columns: 1fr; }
  .options.cols-2 { grid-template-columns: 1fr 1fr; }
  .options.chips { display: flex; flex-wrap: wrap; gap: 8px; }

  .opt {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 16px 18px;
    text-align: left;
    cursor: pointer;
    font: inherit;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.18s ease;
    width: 100%;
    animation: optIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .opt:hover { background: var(--bg-card-hover); border-color: var(--border-strong); transform: translateY(-1px); }
  .opt:active { transform: scale(0.99); }
  .opt.selected {
    background: linear-gradient(135deg, rgba(217,119,87,0.12), rgba(212,165,116,0.08));
    border-color: var(--terracotta);
    box-shadow: 0 0 0 1px var(--terracotta) inset;
  }
  .opt.selected::after { content: '✓'; margin-left: auto; color: var(--terracotta); font-weight: 700; }
  .opt-emoji { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
  .opt-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .opt-label { font-weight: 500; }
  .opt-desc { font-size: 13px; color: var(--text-muted); font-weight: 400; }

  .opt.chip { border-radius: 999px; padding: 9px 16px; width: auto; font-size: 14px; gap: 6px; }
  .opt.chip .opt-emoji { font-size: 16px; width: auto; }

  @keyframes optIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .nav-row {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: space-between;
  }
  .btn {
    background: var(--terracotta);
    color: #1a0e08;
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { background: var(--terracotta-deep); transform: translateY(-1px); color: var(--cream); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-lg { padding: 17px 36px; font-size: 16px; }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 12px 22px;
  }
  .btn-ghost:hover { background: var(--bg-card); color: var(--cream); border-color: var(--border-strong); }

  .btn-link {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 8px;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--border-strong);
  }
  .btn-link:hover { color: var(--terracotta); }

  /* ---------- Targets screen ---------- */
  .targets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 6px;
  }
  .field {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.15s ease;
  }
  .field:focus-within { border-color: var(--terracotta); }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .field-row { display: flex; align-items: baseline; gap: 6px; }
  .field input {
    background: transparent;
    border: none;
    color: var(--cream);
    font: inherit;
    font-size: 22px;
    font-weight: 600;
    font-family: 'Fraunces', serif;
    width: 100%;
    outline: none;
    padding: 0;
  }
  .field-unit { color: var(--text-muted); font-size: 13px; font-weight: 500; }
  .targets-hint {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--forest);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 14px;
    line-height: 1.5;
  }
  .targets-hint strong { color: var(--cream); }

  .target-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(107, 138, 74, 0.12);
    border: 1px solid rgba(107, 138, 74, 0.3);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-dim);
  }
  .target-banner .label { color: var(--forest); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; }
  .target-banner .num { color: var(--cream); font-weight: 600; }

  /* ---------- Location screen ---------- */
  .loc-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
  }
  .loc-icon {
    width: 64px; height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--terracotta), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .zip-row {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .zip-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 12px 18px;
    font: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .zip-input:focus { border-color: var(--terracotta); }

  /* Free-text avoid input (on the avoid question) */
  .custom-avoid {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
    margin-top: 14px;
  }
  .custom-avoid:focus { border-color: var(--terracotta); }
  .custom-avoid::placeholder { color: var(--text-muted); }
  .custom-avoid-label {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* ---------- Loading ---------- */
  .loading { text-align: center; padding: 40px 0; }
  .pot {
    width: 110px;
    height: 110px;
    margin: 0 auto 24px;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    animation: stir 2.5s ease-in-out infinite;
  }
  @keyframes stir { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
  .steam {
    position: absolute;
    top: -10px; left: 50%;
    width: 6px; height: 30px;
    background: linear-gradient(to top, var(--text-dim), transparent);
    border-radius: 3px;
    opacity: 0;
    transform: translateX(-50%);
    animation: steam 2.4s ease-in-out infinite;
  }
  .steam.s2 { left: 38%; animation-delay: 0.6s; }
  .steam.s3 { left: 62%; animation-delay: 1.2s; }
  @keyframes steam {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
    40% { opacity: 0.6; }
    100% { opacity: 0; transform: translate(-50%, -30px) scale(1.4); }
  }
  .loading h2 { font-size: 26px; margin-bottom: 8px; }
  .loading-msg {
    color: var(--text-dim);
    font-size: 15px;
    min-height: 22px;
    transition: opacity 0.4s ease;
  }

  /* ---------- Results ---------- */
  .summary-card {
    background: linear-gradient(135deg, rgba(217,119,87,0.08), rgba(107,138,74,0.05));
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    animation: revealUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes revealUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .summary-card h2 { font-size: 24px; margin-bottom: 8px; color: var(--cream); }
  .summary-card p { color: var(--text-dim); }

  /* dish list (with macros) */
  .dish-list { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .dish-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.18);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .dish-row .name { font-family: 'Fraunces', serif; font-weight: 600; color: var(--cream); font-size: 16px; }
  .dish-row .macros { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .dish-row .macros .kcal { color: var(--gold); font-weight: 600; }

  .section-title {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 28px 0 12px;
    font-weight: 600;
  }

  .place-card, .recipe-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    transition: all 0.18s ease;
    text-decoration: none;
    color: inherit;
  }
  .place-card:hover, .recipe-card:hover {
    border-color: var(--border-strong);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
  }
  .place-card .pin {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--forest), var(--forest-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .recipe-card .pin {
    background: linear-gradient(135deg, var(--terracotta), var(--gold));
  }
  .place-body { flex: 1; min-width: 0; }
  .place-name {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 3px;
    color: var(--cream);
  }
  .place-meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .place-meta .dot { color: var(--border-strong); }
  .place-meta .price { font-weight: 600; letter-spacing: 0.04em; color: var(--text-dim); }
  .place-meta .price.match { color: var(--forest); }
  .place-meta .price.guess { opacity: 0.7; }
  .place-action {
    color: var(--terracotta);
    font-size: 14px;
    font-weight: 600;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .recipe-card { flex-direction: column; }
  .recipe-card .pin { margin-bottom: 4px; }
  .recipe-macros {
    margin-top: 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .recipe-macros .pill {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 9px;
  }
  .recipe-macros .pill .v { color: var(--cream); font-weight: 600; }
  .recipe-macros .pill.kcal .v { color: var(--gold); }
  .recipe-ing {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 8px;
    line-height: 1.55;
  }
  .recipe-ing strong { color: var(--cream); font-weight: 600; }

  /* Recipe search cards (Google search shortcuts) */
  .search-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-decoration: none;
    color: inherit;
    margin-bottom: 8px;
    transition: all 0.18s ease;
    animation: revealUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .search-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .search-card .s-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(217,119,87,0.12);
    border: 1px solid rgba(217,119,87,0.22);
    color: var(--terracotta);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .search-card .s-body { flex: 1; min-width: 0; }
  .search-card .s-label {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .search-card .s-query {
    font-size: 12px;
    color: var(--text-muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .search-card .s-arrow {
    color: var(--terracotta);
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .search-engines {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .search-engine-pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .search-engine-pill:hover {
    border-color: var(--terracotta);
    color: var(--cream);
  }
  .search-engine-pill .icon { font-size: 13px; }

  .results-actions {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .notice {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--terracotta);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 16px;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translate(-50%, 20px);
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    color: var(--cream);
    padding: 12px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 200;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  .toast .check { color: var(--forest); font-weight: 700; }

  footer {
    text-align: center;
    color: var(--text-muted);

const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const progressStep = document.getElementById('progressStep');
const progressTotal = document.getElementById('progressTotal');

function setProgress(step, total) {
  if (step < 0 || step >= total) {
    progressEl.classList.add('hidden');
    progressLabel.style.display = 'none';
  } else {
    progressEl.classList.remove('hidden');
    progressLabel.style.display = 'flex';
    const pct = ((step + 1) / total) * 100;
    progressBar.style.width = pct + '%';
    progressStep.textContent = `Question ${step + 1} of ${total}`;
    progressTotal.textContent = `${Math.round(pct)}%`;
  }
}

function shouldSkipQuestion(q) {
  return q.id === 'distance' && state.answers.format === 'cook';
}

function getVisibleTotal() {
  return QUESTIONS.filter((q) => !shouldSkipQuestion(q)).length;
}

function getVisibleStep(step) {
  let count = 0;
  for (let i = 0; i <= step && i < QUESTIONS.length; i++) {
    if (!shouldSkipQuestion(QUESTIONS[i])) count++;
  }
  return count - 1;
}

function nextVisibleStep(from) {
  let i = from + 1;
  while (i < QUESTIONS.length && shouldSkipQuestion(QUESTIONS[i])) i++;
  return i < QUESTIONS.length ? i : -1;
}

function prevVisibleStep(from) {
  let i = from - 1;
  while (i >= 0 && shouldSkipQuestion(QUESTIONS[i])) i--;
  return i;
}

function transitionTo(renderFn) {
  const current = main.firstElementChild;
  if (current) {
    current.classList.add('leaving');
    setTimeout(() => {
      main.innerHTML = '';
      renderFn();
    }, 220);
  } else {
    main.innerHTML = '';
    renderFn();
  }
}

function saveAndContinue() {
  const kcal = parseTargetInput('t-kcal');
  const p    = parseTargetInput('t-p');
  const c    = parseTargetInput('t-c');
  const f    = parseTargetInput('t-f');
  if (kcal == null && p == null && c == null && f == null) {
    state.targets = null;
  } else {
    state.targets = {};
    if (kcal != null) state.targets.kcal = kcal;
    if (p    != null) state.targets.p    = p;
    if (c    != null) state.targets.c    = c;
    if (f    != null) state.targets.f    = f;
  }
  state.step = 0;
  transitionTo(renderQuestion);
}

function parseTargetInput(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  const v = (el.value || '').trim();
  if (v === '') return null;
  const n = parseFloat(v);
  if (!isFinite(n) || n <= 0) return null;
  return Math.round(n);
}

  const current = state.answers[q.id] ?? (isMulti ? [] : null);
  const isLastVisible = nextVisibleStep(state.step) === -1;

  const customAvoidHtml = q.id === 'avoid' ? `

          ${isLastVisible ? 'Find food →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
  main.appendChild(el);

  const avoidInput = document.getElementById('avoidCustom');
  if (avoidInput) {
    avoidInput.addEventListener('input', (e) => {
      state.answers.avoidCustom = e.target.value;
    });
    avoidInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); advance(q); }
    });
  }

  const optsEl = document.getElementById('opts');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (q.layout === 'chips' ? ' chip' : '');
    btn.style.animationDelay = (i * 35) + 'ms';
    const selected = isMulti
      ? Array.isArray(current) && current.includes(opt.value)
      : current === opt.value;
    if (selected) btn.classList.add('selected');
    btn.innerHTML = `
      <span class="opt-emoji">${opt.emoji}</span>
      <span class="opt-content">
        <span class="opt-label">${opt.label}</span>
        ${opt.desc ? `<span class="opt-desc">${opt.desc}</span>` : ''}
      </span>
    `;
    btn.addEventListener('click', () => onOptionPick(q, opt));
    optsEl.appendChild(btn);
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    const prev = prevVisibleStep(state.step);
    if (prev >= 0) {
      state.step = prev;
      transitionTo(renderQuestion);
    } else {
      transitionTo(renderTargets);
    }
  });
  document.getElementById('nextBtn').addEventListener('click', () => advance(q));
  if (q.optional) {
    document.getElementById('skipBtn').addEventListener('click', () => {
      if (isMulti) state.answers[q.id] = [];
      else state.answers[q.id] = null;
      advance(q);
    });
  }
}

function targetBannerHtml() {
  const t = state.targets;
  const parts = [];
  if (t.kcal) parts.push(`<span class="num">${t.kcal}</span> kcal`);
  if (t.p)    parts.push(`<span class="num">${t.p}</span>g protein`);
  if (t.c)    parts.push(`<span class="num">${t.c}</span>g carbs`);
  if (t.f)    parts.push(`<span class="num">${t.f}</span>g fat`);
  return `<div class="target-banner"><span class="label">Targeting</span> ${parts.join(' · ')}</div>`;
}

function onOptionPick(q, opt) {
  if (q.type === 'multi') {
    const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
    const idx = cur.indexOf(opt.value);
    if (idx >= 0) cur.splice(idx, 1);
    else cur.push(opt.value);
    state.answers[q.id] = cur;
    renderQuestion();
  } else {
    state.answers[q.id] = opt.value;
    setTimeout(() => advance(q), 220);
  }
}

function advance(q) {
  const next = nextVisibleStep(state.step);
  if (next >= 0) {
    state.step = next;
    transitionTo(renderQuestion);
  } else {
    if (state.answers.format === 'cook') {
      transitionTo(renderLoading);
      runRecommendation();
    } else {
      transitionTo(renderLocation);
    }
  }
}

function lastVisibleQuestionIndex() {
  for (let i = QUESTIONS.length - 1; i >= 0; i--) {
    if (!shouldSkipQuestion(QUESTIONS[i])) return i;
  }
  return QUESTIONS.length - 1;
}

function requestGeolocation() {
  if (!('geolocation' in navigator)) {
    setLocStatus("Your browser doesn't support geolocation — try ZIP instead.");
    return;
  }
  setLocStatus('Asking your browser…');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.coords = { lat: pos.coords.latitude, lon: pos.coords.longitude, label: 'your location' };
      transitionTo(renderLoading);
      runRecommendation();
    },
    (err) => {
      console.warn(err);
      setLocStatus("Couldn't get location — type a ZIP or city below.");
    },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
  );
}

async function useZip() {
  const input = document.getElementById('zipInput');
  const q = (input.value || '').trim();
  if (!q) {
    setLocStatus('Type a ZIP code or city first.');
    return;
  }
  setLocStatus('Looking that up…');
  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q);
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) {
      setLocStatus("Couldn't find that place. Try a different ZIP or city.");
      return;
    }
    state.coords = {
      lat: parseFloat(data[0].lat),
      lon: parseFloat(data[0].lon),
      label: data[0].display_name?.split(',').slice(0, 2).join(',') || q,
    };
    transitionTo(renderLoading);
    runRecommendation();
  } catch (e) {
    console.error(e);
    setLocStatus('Lookup failed. Check your connection and try again.');
  }
}

/* ============================================================
   Recommendation engine
============================================================ */
function getCustomAvoidKeywords() {
  const raw = (state.answers && state.answers.avoidCustom) || '';
  return String(raw)
    .split(/[,\n;]/)
    .map((s) => s.trim().toLowerCase())
    .filter((s) => s.length >= 2);
}

function avoidsMatch(text, avoid) {
  const t = ' ' + String(text).toLowerCase() + ' ';
  if (avoid && avoid.length) {
    for (const a of avoid) {
      const kws = AVOID_KEYWORDS[a] || [];
      for (const kw of kws) {
        if (t.includes(kw.toLowerCase())) return true;
      }
    }
  }
  const custom = getCustomAvoidKeywords();
  for (const kw of custom) {
    if (t.includes(kw)) return true;
  }
  return false;
}

function ingredientsBlocked(ings, avoid) {
  if (!ings) return false;
  for (const ing of ings) if (avoidsMatch(ing, avoid)) return true;
  return false;
}

function macroDistance(profile, targets) {
  const p = profile || {};
  let total = 0, count = 0;
  if (targets.kcal) { total += Math.abs((p.kcal || 0) - targets.kcal) / Math.max(targets.kcal, 1); count++; }
  if (targets.p)    { total += Math.abs((p.p    || 0) - targets.p)    / Math.max(targets.p, 1);    count++; }
  if (targets.c)    { total += Math.abs((p.c    || 0) - targets.c)    / Math.max(targets.c, 1);    count++; }
  if (targets.f)    { total += Math.abs((p.f    || 0) - targets.f)    / Math.max(targets.f, 1);    count++; }
  return count ? total / count : 0;
}

function pickCuisineKey(answers) {
  if (answers.cuisine && answers.cuisine !== 'surprise' && FOOD_DATA[answers.cuisine]) {
    return answers.cuisine;
  }
  const avoid = answers.avoid || [];
  const candidates = Object.keys(FOOD_DATA).filter((k) =>
    FOOD_DATA[k].dishes.some((d) => !avoidsMatch(d.name, avoid))
  );
  // If targets are set, prefer cuisines that have at least one dish within tolerance
  if (state.targets) {
    const fitCandidates = candidates.filter((k) =>
      FOOD_DATA[k].dishes.some((d) =>
        !avoidsMatch(d.name, avoid) && macroDistance(getProfile(d.prof), state.targets) < 0.4
      )
    );
    if (fitCandidates.length) return pickRandom(fitCandidates);
  }
  return pickRandom(candidates.length ? candidates : Object.keys(FOOD_DATA));
}

function rankByTargets(items, targets) {
  return items
    .map((it) => ({ it, d: macroDistance(getProfile(it.prof), targets) }))
    .sort((a, b) => a.d - b.d)
    .map((x) => x.it);
}

function generateRecommendation(answers) {
  const cuisineKey = pickCuisineKey(answers);
  const data = FOOD_DATA[cuisineKey];
  const moodTag = answers.mood;
  const healthTag = answers.health;
  const avoid = answers.avoid || [];

  // Tier 1: cuisine + mood/health + avoid
  let pool = data.dishes.filter((d) =>
    (d.tags.includes(moodTag) || d.tags.includes(healthTag)) && !avoidsMatch(d.name, avoid)
  );
  // Tier 2: cuisine + avoid
  if (pool.length < 3) pool = data.dishes.filter((d) => !avoidsMatch(d.name, avoid));

  let picked, looseTargets = false;
  if (state.targets) {
    const ranked = rankByTargets(pool, state.targets);
    const tight = ranked.filter((d) => macroDistance(getProfile(d.prof), state.targets) < 0.35);
    if (tight.length >= 3) {
      picked = tight.slice(0, 5);
    } else if (ranked.length >= 3) {
      // Take the 3-5 closest, even if outside tight tolerance
      picked = ranked.slice(0, 4);
      looseTargets = true;
    } else {
      // Broaden across cuisines for target matching
      const all = [];
      Object.values(FOOD_DATA).forEach((d) => d.dishes.forEach((dd) => all.push(dd)));
      const broad = all.filter((d) => !avoidsMatch(d.name, avoid));
      const broadRanked = rankByTargets(broad, state.targets);
      picked = broadRanked.slice(0, 5);
    }
  } else {
    shuffle(pool);
    picked = pool.slice(0, Math.min(5, Math.max(3, Math.min(pool.length, 4))));
  }

  return {
    cuisineKey,
    cuisineLabel: data.label,
    summary: buildSummary(answers, data, looseTargets),
    dishes: picked.map((d) => ({ name: d.name, prof: d.prof, profile: getProfile(d.prof) })),
    search_queries: data.queries,
    cuisine_tags: data.osm,
    looseTargets,
  };
}

function generateRecipes(answers) {
  const cuisineKey = pickCuisineKey(answers);
  const data = FOOD_DATA[cuisineKey];
  const moodTag = answers.mood;
  const healthTag = answers.health;
  const avoid = answers.avoid || [];

  let pool = data.recipes.filter((r) =>
    (r.tags.includes(moodTag) || r.tags.includes(healthTag)) &&
    !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid)
  );
  if (pool.length < 2) {
    pool = data.recipes.filter((r) =>
      !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid)
    );
  }
  if (pool.length < 2) {
    const all = [];
    Object.values(FOOD_DATA).forEach((d) => d.recipes.forEach((r) => all.push(r)));
    pool = all.filter((r) =>
      (r.tags.includes(moodTag) || r.tags.includes(healthTag)) &&
      !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid)
    );
  }

  let recipes, looseTargets = false;
  if (state.targets) {
    const ranked = rankByTargets(pool, state.targets);
    const tight = ranked.filter((r) => macroDistance(getProfile(r.prof), state.targets) < 0.4);
    if (tight.length >= 2) {
      recipes = tight.slice(0, 3);
    } else if (ranked.length >= 2) {
      recipes = ranked.slice(0, 3);
      looseTargets = true;
    } else {
      const all = [];
      Object.values(FOOD_DATA).forEach((d) => d.recipes.forEach((r) => all.push(r)));
      const broad = all.filter((r) =>
        !avoidsMatch(r.name, avoid) && !ingredientsBlocked(r.ingredients, avoid)
      );
      recipes = rankByTargets(broad, state.targets).slice(0, 3);
    }
  } else {
    shuffle(pool);
    recipes = pool.slice(0, Math.min(3, Math.max(2, pool.length)));
  }

  return {
    cuisineKey,
    cuisineLabel: data.label,
    summary: buildSummary(answers, data, looseTargets),
    recipes: recipes.map((r) => ({ ...r, profile: getProfile(r.prof) })),
    looseTargets,
  };
}

function buildSummary(answers, cuisineData, looseTargets) {
  const moodWord = ({
    comfort: 'comfort-food', light: 'light', adventurous: 'adventurous', classic: 'classic',
  })[answers.mood] || 'good-eats';
  const cuisine = cuisineData.label;

  const openers = [
    `${cuisine} ${moodWord} is the move.`,
    `You're in a ${moodWord} ${cuisine} mood — say less.`,
    `Locked in: ${cuisine}, ${moodWord}, decisive.`,
    `${capitalize(moodWord)} ${cuisine} energy. Got it.`,
    `Tonight reads: ${cuisine}, ${moodWord}, no notes.`,
  ];

  const closerPool = [];
  if (answers.vibe === 'date')   closerPool.push("Romantic enough to count as effort.", "Date-night dish energy — eye contact required.");
  if (answers.vibe === 'family') closerPool.push("Kid-friendly, parent-respectable.", "Built for the whole crew.");
  if (answers.vibe === 'group')  closerPool.push("Made for big tables and louder stories.", "Group-of-friends energy — share everything.");
  if (answers.vibe === 'solo')   closerPool.push("Solo-mission energy — treat yourself.", "Just you, no compromises.");

  if (answers.budget === '$$$') closerPool.push("Splurge mode activated.");
  if (answers.budget === '$' && answers.vibe !== 'date') closerPool.push("Wallet stays happy too.", "Cheap, cheerful, undefeated.");

  if (answers.health === 'indulgent') closerPool.push("Cheese, butter, no regrets.");
  if (answers.health === 'healthy')   closerPool.push("Salads with personality.", "Virtuous but not boring.");

  if (answers.format === 'cook')     closerPool.push("Apron on, let's cook.", "Hot stove, big payoff.");
  if (answers.format === 'delivery') closerPool.push("Couch-mode dinner, coming up.", "Slippers stay on.");

  const opener = pickRandom(openers);
  let closer = closerPool.length ? pickRandom(closerPool) : '';
  if (state.targets) {
    const tCloser = looseTargets
      ? "These are as close to your targets as we could get."
      : "All within striking distance of your targets.";
    closer = closer ? `${closer} ${tCloser}` : tCloser;
  }
  return closer ? `${opener} ${closer}` : opener;
}

/* ---------- Recommendation flow ---------- */
async function runRecommendation() {
  const isCook = state.answers.format === 'cook';
  const startedAt = Date.now();
  const MIN_DWELL = 1200;

  try {
    if (isCook) {
      const rec = generateRecipes(state.answers);
      state.recommendation = rec;
      await holdAtLeast(startedAt, MIN_DWELL);
      stopLoading();
      transitionTo(renderRecipes);
    } else {
      const rec = generateRecommendation(state.answers);
      state.recommendation = rec;
      const places = await findPlaces(rec);
      state.places = places;
      await holdAtLeast(startedAt, MIN_DWELL);
      stopLoading();
      transitionTo(renderRestaurants);
    }
  } catch (err) {
    console.error(err);
    stopLoading();
    transitionTo(() => renderError(
      'Something went sideways.',
      err.message || "We couldn't pull nearby places. Try again, or change your distance."
    ));
  }
}

function holdAtLeast(startedAt, ms) {
  const elapsed = Date.now() - startedAt;
  return new Promise((resolve) => setTimeout(resolve, Math.max(0, ms - elapsed)));
}

  const cards = searches.map((s, i) => {
    const url = `https://www.google.com/search?q=${encodeURIComponent(s.query)}`;
    return `
      <a class="search-card" href="${url}" target="_blank" rel="noopener" style="animation-delay:${i*45}ms;">
        <div class="s-icon">🔍</div>

  // Quick links to other recipe destinations using the broadest search query we built

  const otherEngines = [
    { label: '📺 YouTube',         url: `https://www.youtube.com/results?search_query=${encodeURIComponent(broadQuery)}` },
    { label: '🥄 AllRecipes',      url: `https://www.allrecipes.com/search?q=${encodeURIComponent(broadQuery)}` },

/* ---------- Recipe search builder (Google searches from answers) ---------- */
function buildRecipeSearches(answers, rec) {
  const cuisineLabel = rec.cuisineLabel || '';
  const cuisineLower = cuisineLabel.toLowerCase();
  const searches = [];

  const moodWord = ({
    comfort: 'comfort food',
    light: 'light',
    adventurous: 'adventurous',
    classic: 'classic weeknight',
  })[answers.mood] || '';

  // 1) Cuisine + mood
  if (cuisineLower) {
    searches.push({
      label: `${capitalize(moodWord || 'easy')} ${cuisineLabel} recipes`,
      query: `easy ${moodWord} ${cuisineLower} recipes`.replace(/\s+/g, ' ').trim(),
    });
  }

  // 2) Quick / time-saving
  searches.push({
    label: `30-minute ${cuisineLabel || 'weeknight'} recipes`,
    query: `30 minute ${cuisineLower} recipes`.trim(),
  });

  // 3) Health-aligned
  if (answers.health === 'healthy') {
    searches.push({
      label: `Healthy ${cuisineLabel} recipes`,
      query: `healthy ${cuisineLower} dinner recipes`.trim(),
    });
  } else if (answers.health === 'indulgent') {
    searches.push({
      label: `Best indulgent ${cuisineLabel} dishes`,
      query: `best indulgent ${cuisineLower} comfort food recipes`.trim(),
    });
  }

  // 4) Vibe-aligned
  if (answers.vibe === 'date') {
    searches.push({
      label: `${cuisineLabel} date night recipes`,
      query: `${cuisineLower} date night dinner recipes impressive`.trim(),
    });
  } else if (answers.vibe === 'family') {
    searches.push({
      label: `Kid-friendly ${cuisineLabel} recipes`,
      query: `kid friendly family ${cuisineLower} dinner recipes`.trim(),
    });
  } else if (answers.vibe === 'group') {
    searches.push({
      label: `${cuisineLabel} recipes for a crowd`,
      query: `${cuisineLower} recipes for a crowd party feeding many`.trim(),
    });
  } else if (answers.vibe === 'solo') {
    searches.push({
      label: `${cuisineLabel} recipes for one`,
      query: `${cuisineLower} recipes for one solo cooking small batch`.trim(),
    });
  }

  // 5) Diet constraints from avoid chips
  const avoid = Array.isArray(answers.avoid) ? answers.avoid : [];
  const dietParts = [];
  if (avoid.includes('gluten')) dietParts.push('gluten-free');
  if (avoid.includes('dairy'))  dietParts.push('dairy-free');
  if (avoid.includes('nuts'))   dietParts.push('nut-free');
  if (avoid.includes('eggs'))   dietParts.push('egg-free');
  const noProtein = avoid.includes('red-meat') && avoid.includes('pork');
  const noSea = avoid.includes('seafood') && avoid.includes('shellfish');
  if (noProtein && noSea) dietParts.push('vegetarian');
  else if (noProtein) dietParts.push('pescatarian');
  if (dietParts.length) {
    searches.push({
      label: `${capitalize(dietParts.join(' '))} ${cuisineLabel} recipes`,
      query: `${dietParts.join(' ')} ${cuisineLower} recipes`.trim(),
    });
  }

  // 6) Macro targets
  if (state.targets) {
    if (state.targets.kcal) {
      searches.push({
        label: `${cuisineLabel} recipes under ${state.targets.kcal} calories`,
        query: `${cuisineLower} recipes under ${state.targets.kcal} calories per serving`.trim(),
      });
    }
    if (state.targets.p && state.targets.p >= 30) {
      searches.push({
        label: `High-protein ${cuisineLabel} recipes`,
        query: `high protein ${cuisineLower} recipes ${state.targets.p}g protein`.trim(),
      });
    }
    if (state.targets.c && state.targets.c <= 40) {
      searches.push({
        label: `Low-carb ${cuisineLabel} recipes`,
        query: `low carb ${cuisineLower} recipes`.trim(),
      });
    }
  }

  // 7) Custom avoidances → exclude terms via Google `-"term"` operators
  const customs = String(answers.avoidCustom || '')
    .split(/[,;\n]/).map(s => s.trim()).filter(s => s.length >= 2);
  if (customs.length) {
    const noStr = customs.slice(0, 4).map(c => `-"${c}"`).join(' ');
    searches.push({
      label: `${cuisineLabel} recipes without ${customs.slice(0, 3).join(', ')}`,
      query: `${cuisineLower} recipes ${noStr}`.replace(/\s+/g, ' ').trim(),
    });
  }

  // De-dupe by query
  const seen = new Set();
  return searches.filter((s) => {
    if (!s.query) return false;
    if (seen.has(s.query)) return false;
    seen.add(s.query);
    return true;
  }).slice(0, 7);
}

/* ---------- Price tier estimation (Google-style $ / $$ / $$$) ---------- */
function budgetToTier(budget) {
  return budget === '$' ? 1 : budget === '$$' ? 2 : budget === '$$$' ? 3 : null;
}
function tierToDollars(tier) {
  if (!tier || tier < 1) return '';
  return '$'.repeat(Math.max(1, Math.min(3, Math.round(tier))));
}

// Returns { tier: 1|2|3, confident: bool }
function estimatePriceTier(tags) {
  // 1) Explicit OSM tags (rare but authoritative)
  const explicitKeys = ['price:level', 'price_range', 'price', 'fee:level'];
  for (const k of explicitKeys) {
    const v = tags[k];
    if (!v) continue;
    const s = String(v).toLowerCase().trim();
    if (s === '$' || s === '1' || /\b(low|cheap|budget|inexpensive)\b/.test(s)) return { tier: 1, confident: true };
    if (s === '$$$' || s === '3' || /\b(high|expensive|fine[\s_-]?dining|upscale|premium)\b/.test(s)) return { tier: 3, confident: true };
    if (s === '$$' || s === '2' || /\b(mid|medium|moderate|average)\b/.test(s)) return { tier: 2, confident: true };
    // Dollar-sign count
    const dollarMatch = s.match(/^\$+$/);
    if (dollarMatch) {
      const n = Math.max(1, Math.min(3, dollarMatch[0].length));
      return { tier: n, confident: true };
    }
  }

  // 2) Heuristic: amenity + cuisine + name signals
  const amenity = String(tags.amenity || '').toLowerCase();
  const cuisine = String(tags.cuisine || '').toLowerCase();
  const name    = String(tags.name || '').toLowerCase();

  // Strong $$$ signals
  const highEndCuisines = ['fine_dining','french','molecular','tasting_menu','sushi','steak_house','steakhouse'];
  const highEndKeywords = ['steakhouse','steak house','fine dining','tasting menu',"chef's table",'omakase','michelin','prime','reserve','wine room'];
  if (highEndCuisines.some(t => cuisine.includes(t))) {
    // sushi alone isn't necessarily fancy, but as a cuisine tag it skews mid; only count if also "omakase" etc.
    if (cuisine.includes('omakase') || cuisine.includes('fine_dining') || cuisine.includes('french') || cuisine.includes('molecular') || cuisine.includes('tasting')) {
      return { tier: 3, confident: false };
    }
  }
  if (highEndKeywords.some(k => name.includes(k))) return { tier: 3, confident: false };

  // Strong $ signals
  if (amenity === 'fast_food') return { tier: 1, confident: true };
  const cheapKeywords = ['express','truck','diner','taqueria','dollar','value','snack','quick','cantina','drive-thru','drive thru'];
  if (cheapKeywords.some(k => name.includes(k))) return { tier: 1, confident: false };
  const cheapCuisines = ['burger','pizza','sandwich','kebab','doughnut','fish_and_chips','breakfast','noodle','ice_cream'];
  if (amenity === 'cafe') return { tier: 1, confident: false };
  if (cheapCuisines.some(t => cuisine.includes(t)) && amenity !== 'restaurant') return { tier: 1, confident: false };

  // Default: $$ (most sit-down restaurants)
  return { tier: 2, confident: false };
}

/* ---------- Overpass restaurant search ---------- */
async function findPlaces(rec) {
  if (!state.coords) return [];
  const distChoice = state.answers.distance;
  const radiusMeters = distChoice === '1' ? 1600 : distChoice === '3' ? 4800 : 12000;
  const radiusMi = radiusMeters / 1609.34;

  const cuisineTags = (rec.cuisine_tags || []).map((t) => String(t).toLowerCase().trim()).filter(Boolean);
  const { lat, lon } = state.coords;

  const cuisineRegex = cuisineTags.length ? cuisineTags.map(escapeRegex).join('|') : null;
  const cuisineFilter = cuisineRegex ? `["cuisine"~"${cuisineRegex}",i]` : '';
  const query = `
    [out:json][timeout:20];
    (
      node["amenity"~"restaurant|fast_food|cafe"]${cuisineFilter}(around:${radiusMeters},${lat},${lon});
    );
    out body 40;
  `;

  let elements = [];
  try {
    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(query),
    });
    if (r.ok) {
      const data = await r.json();
      elements = (data.elements || []).filter((e) => e.tags && e.tags.name);
    }
  } catch (e) {
    console.warn('Overpass failed', e);
  }

  if (elements.length === 0 && cuisineRegex) {
    try {
      const fallbackQ = `
        [out:json][timeout:20];
        (
          node["amenity"~"restaurant|fast_food|cafe"](around:${radiusMeters},${lat},${lon});
        );
        out body 40;
      `;
      const r = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(fallbackQ),
      });
      if (r.ok) {
        const data = await r.json();
        elements = (data.elements || []).filter((e) => e.tags && e.tags.name);
      }
    } catch {}
  }

  const targetTier = budgetToTier(state.answers.budget);

  let scored = elements.map((e) => {
    const distMi = haversine(lat, lon, e.lat, e.lon);
    const tagCuisine = (e.tags.cuisine || '').toLowerCase();
    const priceEst = estimatePriceTier(e.tags);

    // Quadratic distance penalty, normalized to the user's chosen radius.
    // "Under 1 mile" cares more about every 0.1mi than "Anywhere" does.
    // At edge of radius: -14. At 50% of radius: -3.5. At 10%: -0.14.
    const distRatio = distMi / radiusMi;
    let score = -14 * distRatio * distRatio;
    if (cuisineTags.length) {
      for (const t of cuisineTags) if (tagCuisine.includes(t)) { score += 6; break; }
    }
    if (targetTier) {
      const diff = Math.abs(priceEst.tier - targetTier);
      if (diff === 0)      score += 8;   // matches budget — preferred
      else if (diff === 1) score += 2;   // adjacent — acceptable
      else                 score -= 6;   // off by 2 tiers — penalized
    }
    return {
      name: e.tags.name,
      cuisine: tagCuisine.replace(/_/g, ' ').replace(/;/g, ', ') || null,
      lat: e.lat, lon: e.lon, distMi,
      amenity: e.tags.amenity,
      priceTier: priceEst.tier,
      priceConfident: priceEst.confident,
      score,
    };
  });

  // Hard-filter mismatches when there are enough good options at ±1 tier
  if (targetTier) {
    const close = scored.filter((p) => Math.abs(p.priceTier - targetTier) <= 1);
    if (close.length >= 3) scored = close;
  }

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 8);
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

/* ---------- Restaurant Results ---------- */
function macroLineHtml(prof) {
  if (!prof) return '';
  return `<span class="kcal">${prof.kcal} kcal</span> · ${prof.p}p · ${prof.c}c · ${prof.f}f`;
}

function renderRestaurants() {
  setProgress(-1, QUESTIONS.length);
  const rec = state.recommendation;
  const places = state.places;
  const el = document.createElement('div');
  el.className = 'screen';

  let placesHtml = '';
  if (places.length === 0) {
    const fallbackQuery = (rec.search_queries && rec.search_queries[0]) || (rec.cuisine_tags && rec.cuisine_tags[0]) || 'restaurants';
    const url = state.coords
      ? `https://www.google.com/maps/search/${encodeURIComponent(fallbackQuery + ' near ' + state.coords.lat + ',' + state.coords.lon)}`
      : `https://www.google.com/maps/search/${encodeURIComponent(fallbackQuery)}`;
    placesHtml = `
      <div class="notice">
        Couldn't find specific matches in our nearby data — but here's a Google Maps search ready to go:
      </div>
      <a class="place-card" href="${url}" target="_blank" rel="noopener">
        <div class="pin">🔎</div>
        <div class="place-body">
          <div class="place-name">Search "${escapeHtml(fallbackQuery)}" on Google Maps</div>
          <div class="place-meta">Opens in a new tab</div>
          <div class="place-action">Open Maps →</div>
        </div>
      </a>
    `;
  } else {
    const targetTier = budgetToTier(state.answers.budget);
    placesHtml = places.map((p, i) => {
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + p.lat + ',' + p.lon)}`;
      const distLabel = p.distMi < 0.1 ? 'right here' : p.distMi.toFixed(1) + ' mi';
      const kindLabel = p.cuisine
        ? capitalize(p.cuisine)
        : (p.amenity === 'cafe' ? 'Café' : (p.amenity === 'fast_food' ? 'Fast casual' : 'Restaurant'));
      const dollars = tierToDollars(p.priceTier);
      const matches = targetTier && p.priceTier === targetTier;
      const guess = !p.priceConfident;
      const priceHtml = dollars
        ? `<span class="price${matches ? ' match' : ''}${guess ? ' guess' : ''}" title="${guess ? 'Estimated price tier' : 'Listed price tier'}">${dollars}${guess ? '*' : ''}</span>`
        : '';
      // Order: kind · price · distance
      const parts = [];
      parts.push(`<span>${escapeHtml(kindLabel)}</span>`);
      if (priceHtml) parts.push(priceHtml);
      parts.push(`<span>${escapeHtml(distLabel)}</span>`);
      const metaHtml = parts.map((m, idx) => idx < parts.length - 1 ? m + '<span class="dot">·</span>' : m).join('');
      return `
        <a class="place-card" href="${mapsUrl}" target="_blank" rel="noopener" style="animation-delay:${i*55}ms;">
          <div class="pin">🍴</div>
          <div class="place-body">
            <div class="place-name">${escapeHtml(p.name)}</div>
            <div class="place-meta">${metaHtml}</div>
            <div class="place-action">★ Ratings & directions →</div>
          </div>
        </a>
      `;
    }).join('');
  }

  const dishesHtml = (rec.dishes || []).map((d) => `
    <div class="dish-row">
      <span class="name">${escapeHtml(d.name)}</span>
      <span class="macros">${macroLineHtml(d.profile)}</span>
    </div>
  `).join('');

  const targetsBanner = state.targets ? targetBannerHtml() : '';

  el.innerHTML = `
    <div class="summary-card">
      <div class="eyebrow">Your verdict</div>
      <h2 class="serif">${escapeHtml(rec.summary || "Here's what I'd do.")}</h2>
      ${targetsBanner}
      ${dishesHtml ? `<div class="dish-list">${dishesHtml}</div>` : ''}
    </div>

    <div class="section-title">Nearby spots</div>
    <p style="color:var(--text-dim); font-size:13px; margin: -4px 0 12px;">Tap any card to open Google Maps — that's where you'll see star ratings, reviews, photos, and hours.</p>
    ${placesHtml}

    <div class="results-actions">
      <button id="shareBtn" class="btn">${shareIconSvg()} Share</button>
      <button id="restartBtn" class="btn btn-ghost">Start over</button>
      <button id="backToQ" class="btn btn-ghost">Tweak my answers</button>
    </div>
  `;
  main.appendChild(el);

  document.getElementById('shareBtn').addEventListener('click', () => shareResult('restaurants'));
  document.getElementById('restartBtn').addEventListener('click', restart);
  document.getElementById('backToQ').addEventListener('click', () => {
    state.step = lastVisibleQuestionIndex();
    transitionTo(renderQuestion);
  });
}

/* ---------- Recipes (cook at home) ---------- */
function renderRecipes() {
  setProgress(-1, QUESTIONS.length);
  const rec = state.recommendation;
  const recipes = rec.recipes || [];

  const el = document.createElement('div');
  el.className = 'screen';

  const recipeHtml = recipes.map((r, i) => {
    const ingredients = (r.ingredients || []).join(', ');
    const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(r.name + ' recipe')}`;
    const prof = r.profile;
    const macroPills = prof ? `
      <div class="recipe-macros">
        <span class="pill kcal"><span class="v">${prof.kcal}</span> kcal</span>
        <span class="pill"><span class="v">${prof.p}</span>g protein</span>
        <span class="pill"><span class="v">${prof.c}</span>g carbs</span>
        <span class="pill"><span class="v">${prof.f}</span>g fat</span>
      </div>
    ` : '';
    return `
      <a class="recipe-card" href="${searchUrl}" target="_blank" rel="noopener" style="animation-delay:${i*70}ms;">
        <div style="display:flex; gap:14px; align-items:flex-start;">
          <div class="pin">🍳</div>
          <div class="place-body">
            <div class="place-name">${escapeHtml(r.name)}</div>
            <div class="place-meta">${escapeHtml(r.brief || '')}</div>
          </div>
        </div>
        ${macroPills}
        <div class="recipe-ing"><strong>You'll need:</strong> ${escapeHtml(ingredients)}</div>
        <div class="place-action" style="margin-top:6px;">Find a recipe →</div>
      </a>
    `;
  }).join('');

  const targetsBanner = state.targets ? targetBannerHtml() : '';

  el.innerHTML = `
    <div class="summary-card">
      <div class="eyebrow">Cooking tonight</div>
      <h2 class="serif">${escapeHtml(rec.summary || "Let's get cooking.")}</h2>
      ${targetsBanner}
    </div>

    <div class="section-title">Recipe ideas</div>
    ${recipeHtml || '<div class="notice">No recipes matched — try changing your filters.</div>'}

    ${buildRecipeSearchSectionHtml()}

    <div class="results-actions">
      <button id="shareBtn" class="btn">${shareIconSvg()} Share</button>
      <button id="restartBtn" class="btn btn-ghost">Start over</button>
      <button id="backToQ" class="btn btn-ghost">Tweak my answers</button>
    </div>
  `;
  main.appendChild(el);
  document.getElementById('shareBtn').addEventListener('click', () => shareResult('recipes'));
  document.getElementById('restartBtn').addEventListener('click', restart);
  document.getElementById('backToQ').addEventListener('click', () => {
    state.step = lastVisibleQuestionIndex();
    transitionTo(renderQuestion);
  });
}

/* ---------- Error ---------- */
function renderError(title, msg) {
  setProgress(-1, QUESTIONS.length);
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `
    <div class="summary-card">
      <div class="eyebrow" style="color: var(--terracotta);">Hmm</div>
      <h2 class="serif">${escapeHtml(title)}</h2>
      <p style="margin-top:8px;">${escapeHtml(msg)}</p>
    </div>
    <div class="results-actions">
      <button id="retryBtn" class="btn">Try again</button>
      <button id="restartBtn" class="btn btn-ghost">Start over</button>
    </div>
  `;
  main.appendChild(el);
  document.getElementById('retryBtn').addEventListener('click', () => {
    transitionTo(renderLoading);
    runRecommendation();
  });
  document.getElementById('restartBtn').addEventListener('click', restart);
}

/* ---------- Restart ---------- */
function restart() {
  state.step = -1;
  state.answers = {};
  state.targets = null;
  state.coords = null;
  state.recommendation = null;
  state.places = [];
  transitionTo(renderWelcome);
}

/* ---------- Share ---------- */
function shareIconSvg() {
  return `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>`;
}

function targetsLine() {
  const t = state.targets; if (!t) return '';
  const parts = [];
  if (t.kcal) parts.push(`${t.kcal} kcal`);
  if (t.p)    parts.push(`${t.p}g protein`);
  if (t.c)    parts.push(`${t.c}g carbs`);
  if (t.f)    parts.push(`${t.f}g fat`);
  return parts.length ? `Targeting ${parts.join(' / ')}` : '';
}

function buildShareText(mode) {
  const rec = state.recommendation || {};
  const summary = (rec.summary || '').trim();
  const lines = ['🍴 What should I eat?'];
  if (summary) lines.push('', summary);
  const tl = targetsLine();
  if (tl) lines.push('', tl);

  if (mode === 'recipes') {
    const recipes = rec.recipes || [];
    if (recipes.length) {
      lines.push('', 'Cooking ideas:');
      recipes.forEach((r) => {
        if (!r || !r.name) return;
        const m = r.profile;
        const macros = m ? ` (~${m.kcal} kcal · ${m.p}p/${m.c}c/${m.f}f)` : '';
        lines.push(`• ${r.name}${macros}${r.brief ? ' — ' + r.brief : ''}`);
      });
    }
  } else {
    const dishes = rec.dishes || [];
    if (dishes.length) {
      lines.push('', 'Trying:');
      dishes.forEach((d) => {
        const m = d.profile;
        const macros = m ? ` (~${m.kcal} kcal · ${m.p}p/${m.c}c/${m.f}f)` : '';
        lines.push(`• ${d.name}${macros}`);
      });
    }
    const top = (state.places || []).slice(0, 3);
    if (top.length) {
      lines.push('', 'Top picks nearby:');
      top.forEach((p) => {
        const dist = p.distMi < 0.1 ? 'right here' : p.distMi.toFixed(1) + ' mi';
        const dollars = tierToDollars(p.priceTier);
        const price = dollars ? ` · ${dollars}${p.priceConfident ? '' : '*'}` : '';
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + p.lat + ',' + p.lon)}`;
        lines.push(`• ${p.name} (${dist}${price}) ${url}`);
      });
    }
  }
  return lines.join('\n');
}

async function shareResult(mode) {
  const text = buildShareText(mode);
  const shareData = { title: 'What Should I Eat?', text };
  try {
    if (navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
      await navigator.share(shareData);
      return;
    }
  } catch (err) {
    if (err && err.name === 'AbortError') return;
  }
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showToast('Copied — paste it to a friend');
      return;
    }
  } catch {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied — paste it to a friend');
  } catch {
    showToast("Couldn't copy — long-press to select");
  }
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  const m = document.getElementById('toastMsg');
  if (!toast || !m) return;
  m.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

/* ---------- Helpers ---------- */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------- Boot ---------- */
renderWelcome();
</script>
